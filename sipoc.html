    <script>
        // --- DATA STATE & HISTORY ---

        let saveTimeout = null;

        let currentLang = 'pl';
        let tooltipTimeout;

        // --- BILINGUAL DICTIONARY ---
        const i18n = {
            pl: {
                tabEditor: "Diagram",
                tabTutorial: "SAMOUCZEK",
                tabInstructions: "INSTRUKCJA OBSŁUGI",
                defaultProject: "Projekt Optymalizacji Procesu",
                mapSubtitle: "Mapa SIPOC",
                btnPrint: "Drukuj",
                undoTitle: "Cofnij (Ctrl+Z)",
                redoTitle: "Ponów (Ctrl+Y)",
                colS: "S - Dostawcy",
                colI: "I - Wejścia",
                colP: "P - Proces",
                colO: "O - Wyjścia",
                colC: "C - Klienci",
                expertTitle: "Porada:",
                placeholder: "Szczegóły...",
                tooltipAdvice: {
                    suppliers: "Dostawcy to nie tylko zewnętrzne firmy. Wewnątrz organizacji Twoim dostawcą jest każdy dział, który przekazuje Ci materiały lub informacje potrzebne do startu.",
                    inputs: "Skup się na jakości wejść. Jeśli dane wejściowe są błędne, proces nigdy nie wygeneruje poprawnego wyjścia (zasada GIGO - Garbage In, Garbage Out).",
                    process: "Trzymaj się wysokiego poziomu. Jeśli masz więcej niż 7 kroków, prawdopodobnie wchodzisz w zbyt duże szczegóły. Skup się na esencji transformacji.",
                    outputs: "Wyjście to Twoja obietnica dla klienta. Powinno być mierzalne i posiadać jasno określone kryteria akceptacji.",
                    customers: "Klient jest sędzią jakości. Pytaj: 'Czego ten konkretny odbiorca potrzebuje od mojego procesu, aby mógł wykonać swoją pracę?'"
                },
                tutorialHTML: `
                    <div class="flex flex-col md:flex-row items-start md:items-center justify-between mb-10 pb-6 border-b border-slate-100 gap-4">
                        <div>
                            <h1 class="text-3xl md:text-4xl font-black text-slate-900 mb-2">Kompendium Wiedzy SIPOC</h1>
                            <p class="text-slate-500 font-medium">Pełny tekst dokumentu instruktażowego</p>
                        </div>
                        <button onclick="switchTab('editor')" class="bg-green-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-green-700 transition-all shadow-md flex items-center gap-2 shrink-0">
                            <i class="fas fa-arrow-left"></i> Wróć do Diagramu
                        </button>
                    </div>
                    <h3>Spis treści</h3>
                    <ol class="mb-8">
                        <li>1. Elementy, z których składa się diagram SIPOC</li>
                        <li>2. Jak przygotować SIPOC krok po kroku</li>
                        <li>3. Dlaczego SIPOC jest kluczowy w Lean Management</li>
                        <li>4. Rola w fazie Define z metody DMAIC</li>
                        <li>5. Najczęstsze błędy popełniane podczas tworzenia SIPOC</li>
                        <li>6. Jak wykorzystać SIPOC w codziennej pracy operacyjnej</li>
                        <li>7. Podsumowanie</li>
                    </ol>
                    <p>SIPOC diagram to jedno z najbardziej fundamentalnych narzędzi stosowanych w Lean Management oraz w projektach Six Sigma. Jego siła wynika z prostoty: pozwala uporządkować kluczowe informacje o procesie na jednej, przejrzystej planszy. Ułatwia zrozumienie granic procesu, jego wejść i wyjść, a także tego, kto jest dostawcą, a kto odbiorcą. W praktyce przemysłowej SIPOC pełni rolę wspólnego języka, dzięki któremu inżynierowie, operatorzy, liderzy produkcji i zespoły projektowe mogą zobaczyć proces z lotu ptaka jeszcze zanim przejdą do szczegółowych analiz.</p>
                    <p>To narzędzie często wykorzystuje się na początku projektów DMAIC, ale nie jest ograniczone tylko do Six Sigma. SIPOC świetnie sprawdza się również jako szybka mapa referencyjna podczas warsztatów Kaizen, wdrażania standardów pracy, analiz ryzyka czy wdrożenia nowych pracowników. W wielu firmach stanowi obowiązkowy załącznik do dokumentacji procesu, ponieważ wymusza jasne określenie, gdzie proces się zaczyna, a gdzie kończy. Co ważne – jego opracowanie zajmuje niewiele czasu, a wartość informacyjna jest bardzo duża.</p>
                    <p>W praktyce, gdy organizacja ma problemy z niejasnymi odpowiedzialnościami, reklamacjami jakościowymi lub brakiem transparentności w przepływach, już samo stworzenie SIPOC potrafi ujawnić kluczowe luki. To właśnie prostota i uniwersalność sprawiają, że SIPOC jest narzędziem, które nigdy się nie starzeje, mimo zmieniających się metod zarządzania i technologii wspierających procesy.</p>
                    <h2>Elementy, z których składa się diagram SIPOC</h2>
                    <p>SIPOC to akronim od pięciu podstawowych kategorii: Suppliers, Inputs, Process, Outputs, Customers. Każdy z tych elementów pełni swoją specyficzną rolę i razem tworzą strukturę, która pozwala uchwycić sedno działania procesu. Chociaż na pierwszy rzut oka przypomina prostą tabelę, jej wypełnienie wymaga przemyślenia przepływu wartości i odpowiedzialności.</p>
                    <p>Pierwszym elementem są dostawcy (Suppliers) – czyli wszystkie podmioty, które dostarczają wejścia potrzebne do wykonania procesu. Mogą to być zewnętrzni kontrahenci, inne działy, ale również systemy informatyczne czy nawet operatorzy. To wskazuje, że proces zaczyna się nie w momencie, kiedy my go wykonujemy, ale kiedy ktoś dostarcza nam dane lub materiały.</p>
                    <p>Wejścia (Inputs) to wszystko, co jest konieczne do realizacji procesu: materiały, instrukcje, dane, narzędzia, wymagania jakościowe. W praktyce przemysłowej często okazuje się, że to właśnie w tej kolumnie ujawniają się powtarzalne problemy – na przykład niepełne specyfikacje, braki materiałowe czy niejasne kryteria jakości.</p>
                    <p>Proces (Process) to zazwyczaj 4–7 kluczowych kroków, stanowiących esencję tego, co dzieje się między wejściem a wyjściem. W diagramie SIPOC nie opisujemy szczegółowych instrukcji pracy, lecz kroki na poziomie makro – tak, aby każdy zespół mógł zrozumieć całościowy przepływ.</p>
                    <p>Wyjścia (Outputs) to produkty, półprodukty, informacje lub usługi, które proces generuje. Dobrą praktyką jest wskazanie również ich kluczowych parametrów lub wymagań jakościowych, ponieważ to one determinują satysfakcję klientów.</p>
                    <p>Ostatni element to klienci (Customers). Mogą to być klienci zewnętrzni lub wewnętrzni, w zależności od rodzaju procesu. Ich perspektywa jest kluczowa, ponieważ to właśnie potrzeby klientów określają, czy proces jest efektywny i czy generuje wartość.</p>
                    <h2>Jak przygotować SIPOC krok po kroku</h2>
                    <p>Przygotowanie SIPOC wydaje się proste, ale w praktyce jego jakość zależy od tego, jak dobrze zespół rozumie proces. Najlepiej jest tworzyć go wspólnie – z udziałem przedstawicieli produkcji, jakości, logistyki, inżynierii procesu i liderów. Każdy z tych działów ma inną perspektywę i może wnieść unikalne informacje, które zapobiegają pominięciu kluczowych elementów.</p>
                    <p>Pierwszy krok to jasne określenie granicy procesu: gdzie proces się zaczyna, a gdzie kończy. Bez tego zespół będzie wciągał do mapy elementy, które nie należą do analizowanego obszaru, co spowoduje chaos i brak przejrzystości. Granice procesu powinny być zaakceptowane przez wszystkich.</p>
                    <p>Następnie warto zacząć od kolumny Process, określając 4–7 kroków wysokopoziomowych. Zbyt duża szczegółowość sprawi, że SIPOC straci swoją funkcję mapy przeglądowej; zbyt mała – że nie odda specyfiki przepływu. Dobrym punktem odniesienia jest perspektywa operatora, który wykonuje kluczowe czynności.</p>
                    <p>Dopiero później przechodzi się do wypełnienia Outputs, Customers, a następnie Inputs i Suppliers. Ta kolejność nie jest przypadkowa – pozwala zachować logikę przepływu, unikając typowego błędu, jakim jest wpisywanie dostawców, zanim ustalimy, czego faktycznie potrzebuje proces.</p>
                    <p>Na koniec zespół powinien jeszcze raz przejrzeć SIPOC i ocenić, czy wszystkie informacje są kompletne oraz jednoznaczne. Jeśli diagram jest zbyt ogólny, nie wniesie wartości. Jeśli natomiast jest zbyt szczegółowa, utrudni szybkie zrozumienie procesu przez osoby spoza zespołu.</p>
                    <h2>Dlaczego SIPOC jest kluczowy w Lean Management</h2>
                    <p>W organizacjach, które stosują Lean, priorytetem jest eliminacja marnotrawstwa i budowanie stabilnych, przewidywalnych procesów. SIPOC wpisuje się w ten cel, ponieważ pozwala szybko zidentyfikować kluczowe źródła problemów – zwłaszcza tych związanych z jakością wejść, zmianami w wymaganiach lub niejasnymi odpowiedzialnościami. Ponadto SIPOC stanowi świetne narzędzie komunikacyjne, ułatwiając dyskusję między działami i pomagając unikać typowych nieporozumień.</p>
                    <p>Jednym z powodów, dla których SIPOC jest tak skuteczny, jest to, że wymusza myślenie o procesie w kontekście przepływu wartości. Wiele zespołów koncentruje się wyłącznie na czynnościach, które wykonują, nie analizując, dla kogo i dlaczego je wykonują. SIPOC sprawia, że proces nie jest analizowany w izolacji, ale w relacji z klientem końcowym.</p>
                    <p>Ponadto narzędzie to wspiera standaryzację – a ta jest fundamentem Lean. Kiedy zespół tworzy SIPOC dla danego procesu, tworzy tym samym szkielet, który ułatwia rozwój instrukcji pracy, analizę FMEA, mapowanie strumienia wartości czy identyfikację potencjalnych usprawnień. Jest to szczególnie ważne w środowiskach o dużej zmienności lub w zespołach o wysokiej rotacji pracowników.</p>
                    <p>SIPOC pomaga również w identyfikacji krytycznych punktów, w których powstają błędy. Wiele organizacji odkrywa, że problemy jakościowe wynikają nie z samego procesu, lecz z jakości wejść, które do niego trafiają. Ten wgląd jest często przełomowy – i właśnie dzięki temu SIPOC od lat jest narzędziem pierwszego wyboru dla praktyków Lean.</p>
                    <h2>Rola w fazie Define z metody DMAIC</h2>
                    <p>W metodologii DMAIC, stosowanej w Six Sigma, SIPOC jest jednym z podstawowych narzędzi używanych w fazie Define. Jego zadaniem jest precyzyjne zdefiniowanie procesu, zanim zespół przejdzie do analizy danych, pomiarów czy identyfikacji przyczyn problemu. SIPOC daje kontekst dla dalszej pracy projektowej, wskazując, gdzie należy skoncentrować pomiary i jakie zmienne mogą wpływać na wyniki.</p>
                    <p>W praktyce oznacza to, że bez dobrze przygotowanego SIPOC projekt Six Sigma ma większe ryzyko błądzenia i koncentrowania się na błędnych aspektach procesu. Dlatego doświadczeni Black Beltowie zawsze zaczynają od zmapowania procesu w formie SIPOC, nawet jeśli wydaje się, że problem jest doskonale znany.</p>
                    <p>Jednym z istotnych elementów w projektach Six Sigma jest identyfikacja tzw. CTQ (Critical To Quality) – krytycznych charakterystyk ważnych dla klienta. SIPOC stanowi fundament do ich identyfikacji, ponieważ opisuje zarówno klientów, jak i oczekiwane wyjścia z procesu. To sprawia, że cały projekt może być prowadzony z perspektywy klienta, a nie wewnętrznych założeń zespołu.</p>
                    <p>Dodatkowo SIPOC pomaga określić zakres projektu i upewnić się, że nie obejmuje on zbyt szerokiego obszaru. Wielu liderów projektów popełnia błąd, próbując rozwiązać problem w całym procesie, zamiast skupić się na jego konkretnej części. SIPOC pozwala wizualnie ustalić, gdzie znajduje się analizowany fragment, co znacznie ułatwia zarządzanie projektem.</p>
                    <h2>Najczęstsze błędy popełniane podczas tworzenia SIPOC</h2>
                    <p>Chociaż SIPOC jest narzędziem prostym, zespoły często popełniają powtarzalne błędy, które zmniejszają jego wartość. Pierwszym z nich jest tworzenie zbyt szczegółowego SIPOC, który przestaje być mapą wysokopoziomową, a staje się instrukcją pracy. Takie podejście utrudnia strategiczne spojrzenie na proces i komplikuje komunikację.</p>
                    <p>Drugim częstym błędem jest pomijanie klientów wewnętrznych. Zespoły często wpisują tylko klientów zewnętrznych, zapominając, że to właśnie odbiorcy wewnętrzni są najczęściej źródłem informacji zwrotnych i problemów jakościowych. Brak ich perspektywy sprawia, że SIPOC staje się niepełny.</p>
                    <p>Innym problemem jest zbyt ogólne definiowanie wejść, na przykład wpisywanie „materiały” zamiast „materiał X o specyfikacji Y”. W efekcie mapa nie pomaga w analizie przyczyn problemów, ponieważ nie pokazuje istotnych parametrów wejściowych. To samo dotyczy zbyt ogólnych opisów wyjść, które nie uwzględniają wymagań jakościowych.</p>
                    <p>Wreszcie częstym błędem jest tworzenie SIPOC bez udziału osób wykonujących pracę. Taka mapa jest zwykle teoretyczna i oderwana od realiów produkcyjnych. Operatorzy i technicy mogą wnieść kluczowe informacje, których nie znajdziemy w dokumentacji.</p>
                    <h2>Jak wykorzystać SIPOC w codziennej pracy operacyjnej</h2>
                    <p>SIPOC to nie tylko dokument projektowy – może być używany w codziennym zarządzaniu procesami. W wielu firmach wykorzystywany jest podczas szkoleń nowych pracowników jako szybka mapa orientacyjna, która pozwala zrozumieć kontekst pracy. Jest również podstawą do analiz przyczyn źródłowych, ponieważ jasno pokazuje, które elementy wejść lub wyjść mogą generować problemy.</p>
                    <p>W środowiskach produkcyjnych diagram SIPOC stanowi fundament dla bardziej zaawansowanych narzędzi lean, takich jak FMEA, VSM czy diagram Ishikawy. Dzięki zarysowaniu kluczowych elementów procesu zespoły mogą szybciej identyfikować potencjalne punkty ryzyka i wdrażać działania zapobiegawcze.</p>
                    <p>W firmach usługowych SIPOC diagram pomaga porządkować przepływy informacji, co jest szczególnie ważne w procesach z udziałem wielu systemów IT. Ułatwia identyfikację błędów wynikających z niekompletnych danych lub niewłaściwego przekazywania informacji między działami.</p>
                    <div class="summary-box">
                        <h2 style="border:none; margin-top:0;">Podsumowanie</h2>
                        <p>SIPOC to jedno z najbardziej uniwersalnych i praktycznych narzędzi Lean i Six Sigma. Mimo prostoty, jego zastosowanie pozwala uporządkować proces, zrozumieć wymagania klientów, zidentyfikować kluczowe wejścia i ustalić granice procesu. Właśnie dlatego SIPOC jest fundamentem analiz procesowych, warsztatów problem-solving oraz projektów DMAIC. Jego siła tkwi w tym, że zapewnia wspólny język dla całej organizacji – od operatorów, przez inżynierów, aż po menedżerów wyższego szczebla.</p>
                        <p>W dobrze wdrożonym środowisku Lean SIPOC nie jest jednorazowym dokumentem, ale żywym narzędziem wykorzystywanym do szkolenia, wprowadzania zmian i ciągłego doskonalenia. Pomaga zrozumieć proces, zanim zaczniemy go mierzyć, analizować lub optymalizować. Dlatego każdy praktyk Lean powinien mieć je w swoim zestawie podstawowych narzędzi.</p>
                    </div>
                `,

                tutorialHTML: `
                    <div class="flex flex-col md:flex-row items-start md:items-center justify-between mb-10 pb-6 border-b border-slate-100 gap-4">
                        <div>
                            <h1 class="text-3xl md:text-4xl font-black text-slate-900 mb-2">SIPOC Knowledge Base</h1>
                            <p class="text-slate-500 font-medium">Full instructional document</p>
                        </div>
                        <button onclick="switchTab('editor')" class="bg-green-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-green-700 transition-all shadow-md flex items-center gap-2 shrink-0">
                            <i class="fas fa-arrow-left"></i> Back to Diagram

                    </div>
                    <h3>Table of Contents</h3>
                    <ol class="mb-8">
                        <li>1. Elements that make up a SIPOC diagram</li>
                        <li>2. How to prepare a SIPOC step by step</li>
                        <li>3. Why SIPOC is crucial in Lean Management</li>
                        <li>4. Role in the Define phase of the DMAIC method</li>
                        <li>5. Most common mistakes made when creating a SIPOC</li>
                        <li>6. How to use SIPOC in daily operational work</li>
                        <li>7. Summary</li>
                    </ol>
                    <p>The SIPOC diagram is one of the most fundamental tools used in Lean Management and Six Sigma projects. Its strength comes from its simplicity: it allows you to organize key information about a process on a single, clear board. It helps in understanding the boundaries of the process, its inputs and outputs, as well as who the supplier is and who the recipient is. In industrial practice, SIPOC acts as a common language, enabling engineers, operators, production leaders, and project teams to see the process from a bird's-eye view before moving on to detailed analyses.</p>
                    <p>This tool is often used at the beginning of DMAIC projects, but it is not limited to Six Sigma. SIPOC also works great as a quick reference map during Kaizen workshops, implementing work standards, risk analyses, or onboarding new employees. In many companies, it is a mandatory attachment to process documentation because it forces a clear definition of where the process begins and ends. Importantly, developing it takes little time, yet the informational value is very high.</p>
                    <p>In practice, when an organization struggles with unclear responsibilities, quality complaints, or a lack of transparency in workflows, simply creating a SIPOC can reveal key gaps. It is this simplicity and universality that makes SIPOC a tool that never ages, despite changing management methods and process-supporting technologies.</p>
                    <h2>Elements that make up a SIPOC diagram</h2>
                    <p>SIPOC is an acronym for five basic categories: Suppliers, Inputs, Process, Outputs, Customers. Each of these elements plays a specific role, and together they form a structure that captures the essence of how a process operates. Although at first glance it resembles a simple table, filling it out requires thinking about value flow and responsibilities.</p>
                    <p>The first element is <strong>Suppliers</strong> – all entities that provide the inputs needed to execute the process. These can be external contractors, other departments, but also IT systems or even operators. This indicates that the process doesn't begin when we start executing it, but when someone provides us with data or materials.</p>
                    <p><strong>Inputs</strong> are everything necessary to complete the process: materials, instructions, data, tools, and quality requirements. In industrial practice, it often turns out that it is in this column where recurring problems are revealed – for example, incomplete specifications, material shortages, or unclear quality criteria.</p>
                    <p>The <strong>Process</strong> is typically 4–7 key steps representing the essence of what happens between the input and the output. In a SIPOC diagram, we do not describe detailed work instructions, but rather macro-level steps – so that any team can understand the overall flow.</p>
                    <p><strong>Outputs</strong> are the products, semi-finished products, information, or services that the process generates. It is a good practice to also indicate their key parameters or quality requirements, as these determine customer satisfaction.</p>
                    <p>The final element is <strong>Customers</strong>. They can be external or internal, depending on the type of process. Their perspective is crucial because customer needs determine whether the process is effective and whether it generates value.</p>
                    <h2>How to prepare a SIPOC step by step</h2>
                    <p>Preparing a SIPOC seems simple, but in practice, its quality depends on how well the team understands the process. It's best created collaboratively – involving representatives from production, quality, logistics, process engineering, and leadership. Each department has a different perspective and can provide unique information, preventing key elements from being missed.</p>
                    <p>The first step is clearly defining the process boundary: where the process begins and where it ends. Without this, the team will start pulling elements into the map that do not belong to the analyzed area, causing chaos and a lack of transparency. Process boundaries should be accepted by everyone.</p>
                    <p>Next, it's worth starting with the Process column, defining 4–7 high-level steps. Too much detail will make the SIPOC lose its function as an overview map; too little – it won't reflect the specific nature of the flow. A good reference point is the perspective of the operator performing key activities.</p>
                    <p>Only then do we move on to fill out the Outputs, Customers, and subsequently Inputs and Suppliers. This sequence is not accidental – it helps maintain the logic of the flow, avoiding the common mistake of listing suppliers before establishing what the process actually needs.</p>
                    <p>Finally, the team should review the SIPOC once more and assess if all the information is complete and unambiguous. If the diagram is too general, it adds no value. Conversely, if it's too detailed, it will be harder for individuals outside the team to quickly understand the process.</p>
                    <h2>Why SIPOC is crucial in Lean Management</h2>
                    <p>In organizations that apply Lean, the priority is eliminating waste and building stable, predictable processes. SIPOC fits into this goal because it allows for quick identification of key problem sources – especially those related to input quality, changing requirements, or unclear responsibilities. Furthermore, SIPOC is an excellent communication tool, facilitating discussion across departments and helping avoid typical misunderstandings.</p>
                    <p>One reason SIPOC is so effective is that it forces thinking about the process in the context of value flow. Many teams focus solely on the tasks they perform, without analyzing for whom and why they are doing them. SIPOC ensures the process is not analyzed in isolation, but in relation to the final customer.</p>
                    <p>Moreover, this tool supports standardization – the foundation of Lean. When a team creates a SIPOC for a given process, they build a framework that simplifies developing work instructions, conducting FMEA analysis, value stream mapping, or identifying potential improvements. This is especially important in high-variability environments or teams with high employee turnover.</p>
                    <p>SIPOC also helps identify critical points where errors occur. Many organizations discover that quality problems stem not from the process itself, but from the quality of inputs entering it. This insight is often a breakthrough – and that's precisely why SIPOC has been the tool of choice for Lean practitioners for years.</p>
                    <h2>Role in the Define phase of the DMAIC method</h2>
                    <p>In the DMAIC methodology used in Six Sigma, SIPOC is one of the foundational tools used during the Define phase. Its purpose is to precisely define the process before the team moves on to data analysis, measurement, or root cause identification. SIPOC provides context for further project work, indicating where measurements should be focused and what variables may affect the results.</p>
                    <p>In practice, this means that without a well-prepared SIPOC, a Six Sigma project carries a higher risk of going astray and focusing on the wrong aspects of the process. That's why experienced Black Belts always start by mapping the process via SIPOC, even if the problem seems perfectly well-known.</p>
                    <p>A significant element in Six Sigma projects is the identification of CTQs (Critical To Quality) – vital characteristics important to the customer. SIPOC is the foundation for their identification, as it details both the customers and the expected process outputs. This ensures the entire project is guided by the customer's perspective, not internal team assumptions.</p>
                    <p>Additionally, SIPOC helps determine the project scope and ensures it doesn't cover too broad an area. Many project leaders make the mistake of trying to solve a problem across the entire process rather than focusing on a specific segment. SIPOC allows visual determination of where the analyzed section lies, making project management significantly easier.</p>
                    <h2>Most common mistakes made when creating a SIPOC</h2>
                    <p>Although SIPOC is a straightforward tool, teams frequently make repetitive errors that diminish its value. The first is creating a SIPOC that is overly detailed, turning it from a high-level map into a work instruction. Such an approach hinders a strategic view of the process and complicates communication.</p>
                    <p>The second common mistake is omitting internal customers. Teams often list only external customers, forgetting that internal recipients are mostly the source of feedback and quality issues. Lacking their perspective renders the SIPOC incomplete.</p>
                    <p>Another problem is defining inputs too broadly, such as writing "materials" instead of "material X with specification Y". Consequently, the map doesn't assist in root cause analysis because it fails to display vital input parameters. The same applies to overly generic output descriptions that don't consider quality requirements.</p>
                    <p>Finally, a frequent error is creating a SIPOC without the involvement of people actually executing the work. Such a map is usually theoretical and detached from production realities. Operators and technicians can provide critical insights that aren't found in documentation.</p>
                    <h2>How to use SIPOC in daily operational work</h2>
                    <p>SIPOC isn't just a project document – it can be utilized in daily process management. In many companies, it is used during new employee training as a quick orientation map that helps grasp the work context. It is also the basis for root cause analyses since it clearly shows which input or output elements might be generating problems.</p>
                    <p>In manufacturing environments, a SIPOC diagram serves as the foundation for more advanced lean tools, such as FMEA, VSM, or Ishikawa diagrams. By outlining key process elements, teams can more swiftly identify potential risk points and implement preventive actions.</p>
                    <p>In service companies, the SIPOC diagram helps organize information flows, which is especially crucial in processes involving multiple IT systems. It eases the identification of errors stemming from incomplete data or improper information transfer between departments.</p>
                    <div class="summary-box">
                        <h2 style="border:none; margin-top:0;">Summary</h2>
                        <p>SIPOC is one of the most versatile and practical tools in Lean and Six Sigma. Despite its simplicity, its application helps structure a process, understand customer requirements, identify key inputs, and set process boundaries. This is precisely why SIPOC acts as the foundation for process analyses, problem-solving workshops, and DMAIC projects. Its power lies in providing a common language for the entire organization – from operators, through engineers, up to top management.</p>
                        <p>In a properly implemented Lean environment, SIPOC is not a one-off document but a living tool used for training, implementing changes, and continuous improvement. It helps understand the process before we start measuring, analyzing, or optimizing it. Therefore, every Lean practitioner should have it in their basic toolkit.</p>
                    </div>

                    <ul>
                        <li>Every action (adding row, removing row, typing text) is tracked by the system.</li>
                        <li>To revert an action press <strong>Ctrl + Z</strong> (or use the arrow in the top navigation). To redo an action use <strong>Ctrl + Y</strong>.</li>
                    </ul>
                    <h3>4. Deleting rows</h3>
                    <ul>
                        <li>Hover your mouse cursor over any block in the row you wish to delete.</li>
                        <li>A small, circular <strong><i class="fas fa-times text-red-500"></i></strong> button will appear in its top right corner. Click it to delete the ENTIRE row from all columns.</li>
                    </ul>
                    <h3>5. Saving and loading your map</h3>
                    <ul>
                        <li>To save your progress to a <code>.json</code> file on your device, use the <strong>Save to file</strong> button located in the <u>main sidebar menu on the left (under Projects section)</u>.</li>
                        <li>This allows you to save all your diagrams simultaneously. To load data, simply use the "Load from file" option within the same sidebar menu!</li>
                    </ul>
                    <h3>6. Printing and PDF generation</h3>
                    <ul>
                        <li>You can easily print or save your finished diagram as a PDF. Click the <strong><i class="fas fa-print"></i> Print</strong> button.</li>
                        <li>The app will trigger the browser's print dialog. To save the file as a PDF, change the destination printer to "Save as PDF" (or "Microsoft Print to PDF").</li>
                        <li>The system automatically hides all unnecessary UI elements (buttons, tooltips) during printing and optimizes the layout for an A4 landscape format.</li>
                    </ul>
                    <hr>
                    <div class="summary-box">
                        <h3 style="margin-top:0;">Tip: Project Name</h3>
                        <p>It's always a good idea to start your work by entering the process/project name in the main field at the very top (default "Process Optimization Project"). This will be prominently displayed on your printout!</p>
                    </div>
                `
            }
        };

        // --- NASŁUCHIWANIE KOMUNIKATÓW Z INDEX.HTML ---
        window.addEventListener('message', (event) => {
            if (event.data.action === 'requestExport') {
                window.parent.postMessage({
                    action: 'exportData',
                    source: 'sipoc',
                    data: {
                        project: document.getElementById('project-name').value,
                        version: "3.2",
                        data: state
                    }
                }, '*');
            } 
            else if (event.data.action === 'importData') {
                const payload = event.data.data;
                if (payload) {
                    if (payload.data) {
                        state = payload.data;
                        if (payload.project) {
                            document.getElementById('project-name').value = payload.project;
                        }
                    } else if (Array.isArray(payload.process)) {
                        state = payload;
                    }
                    render();
                    
                    // Reset historii po załadowaniu pliku
                    historyStack = [];
                    historyIndex = -1;
                    saveState(true);
                    
                    showNotification(currentLang === 'pl' ? "Dane SIPOC załadowane!" : "SIPOC data loaded!");
                }
            }
            else if (event.data.action === 'setLanguage') {
                setLanguage(event.data.lang);
            }
        });

        // --- HISTORIA STANÓW (UNDO / REDO) ---
        function deepCopy(obj) {
            return JSON.parse(JSON.stringify(obj));
        }

        function saveState(immediate = false) {
            const doSave = () => {
                const currentStateStr = JSON.stringify(state);
                // Nie zapisuj jeśli stan się nie zmienił
                if (historyIndex >= 0 && JSON.stringify(historyStack[historyIndex]) === currentStateStr) {
                    return; 
                }
                
                // Odcięcie przyszłej historii jeśli nadpisujemy po wcześniejszym cofnięciu
                if (historyIndex < historyStack.length - 1) {
                    historyStack = historyStack.slice(0, historyIndex + 1);
                }
                
                historyStack.push(deepCopy(state));
                historyIndex++;
                
                // Limit zapamiętywanych stanów (50)
                if (historyStack.length > 50) {
                    historyStack.shift();
                    historyIndex--;
                }
                updateHistoryButtons();
            };

            if (immediate) {
                clearTimeout(saveTimeout);
                doSave();
            } else {
                // Debounce przy wpisywaniu tekstu - zapis po 800ms braku aktywności
                clearTimeout(saveTimeout);
                saveTimeout = setTimeout(doSave, 800); 
            }
        }

        function undo() {
            if (historyIndex > 0) {
                historyIndex--;
                state = deepCopy(historyStack[historyIndex]);
                render();
                updateHistoryButtons();
            }
        }

        function redo() {
            if (historyIndex < historyStack.length - 1) {
                historyIndex++;
                state = deepCopy(historyStack[historyIndex]);
                render();
                updateHistoryButtons();
            }
        }

        function updateHistoryButtons() {
            const btnUndo = document.getElementById('btn-undo');
            const btnRedo = document.getElementById('btn-redo');
            if(btnUndo) btnUndo.disabled = historyIndex <= 0;
            if(btnRedo) btnRedo.disabled = historyIndex >= historyStack.length - 1;
        }

        // Skróty klawiaturowe Ctrl+Z / Ctrl+Y
        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') {
                if (e.shiftKey) {
                    redo();
                } else {
                    undo();
                }
                e.preventDefault();
            }
            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'y') {
                redo();
                e.preventDefault();
            }
        });

        // --- FUNKCJE JĘZYKOWE ---
        function setLanguage(lang) {
            if (!i18n[lang]) return;
            currentLang = lang;
            const dict = i18n[lang];

            document.getElementById('btn-editor-text').innerText = dict.tabEditor;
            document.getElementById('btn-tutorial-text').innerText = dict.tabTutorial;
            document.getElementById('btn-instructions-text').innerText = dict.tabInstructions;

            document.getElementById('map-subtitle').innerText = dict.mapSubtitle;
            document.getElementById('btn-print-text').innerText = dict.btnPrint;
            
            document.getElementById('btn-undo').title = dict.undoTitle;
            document.getElementById('btn-redo').title = dict.redoTitle;

            const projectNameInput = document.getElementById('project-name');
            if (projectNameInput.value === i18n.pl.defaultProject || projectNameInput.value === i18n.en.defaultProject || projectNameInput.value === "") {
                projectNameInput.value = dict.defaultProject;
            }

            document.getElementById('col-s-text').innerText = dict.colS;
            document.getElementById('col-i-text').innerText = dict.colI;
            document.getElementById('col-p-text').innerText = dict.colP;
            document.getElementById('col-o-text').innerText = dict.colO;
            document.getElementById('col-c-text').innerText = dict.colC;

            document.getElementById('tutorial-content').innerHTML = dict.tutorialHTML;
            document.getElementById('instructions-content').innerHTML = dict.instructionsHTML;
            document.getElementById('footer-text').innerHTML = dict.footer;

            render();
        }

        // --- SYSTEM PODPOWIEDZI W DEDYKOWANEJ CHMURCE (TOAST) ---
        function showTooltip(key) {
            const bubble = document.getElementById('floating-tooltip');
            const title = document.getElementById('float-title');
            const text = document.getElementById('float-text');
            const icon = document.getElementById('float-icon');
            
            const dict = i18n[currentLang];
            const labels = { suppliers: dict.colS, inputs: dict.colI, process: dict.colP, outputs: dict.colO, customers: dict.colC };
            
            // Kolory Hex przypisane na sztywno, żeby zapobiec czyszczeniu przez silnik CSS
            const hexColors = { suppliers: "#14b8a6", inputs: "#10b981", process: "#22c55e", outputs: "#84cc16", customers: "#06b6d4" };
            
            title.innerText = dict.expertTitle + " " + labels[key];
            text.innerText = dict.tooltipAdvice[key];
            
            // Stylizacja na kolor odpowiedniej sekcji
            bubble.style.borderTopColor = hexColors[key];
            icon.style.color = hexColors[key];
            icon.innerHTML = '<i class="fas fa-lightbulb"></i>';
            
            // Animacja pojawienia
            bubble.classList.remove('opacity-0', 'scale-95', 'translate-y-4', 'pointer-events-none');
            bubble.classList.add('opacity-100', 'scale-100', 'translate-y-0');
            
            // Automatyczne ukrycie po 5 sekundach
            clearTimeout(tooltipTimeout);
            tooltipTimeout = setTimeout(() => {
                bubble.classList.remove('opacity-100', 'scale-100', 'translate-y-0');
                bubble.classList.add('opacity-0', 'scale-95', 'translate-y-4', 'pointer-events-none');
            }, 5000);
        }

        function showNotification(message, isError = false) {
            const container = document.getElementById('notification-container');
            const notif = document.createElement('div');
            
            const bgColor = isError ? 'bg-red-500' : 'bg-green-500';
            const icon = isError ? '<i class="fas fa-exclamation-circle"></i>' : '<i class="fas fa-check-circle"></i>';
            
            notif.className = `${bgColor} text-white px-4 py-3 rounded-lg shadow-lg font-medium transition-all duration-300 transform translate-y-10 opacity-0 flex items-center gap-3`;
            notif.innerHTML = `${icon} <span>${message}</span>`;
            
            container.appendChild(notif);
            
            requestAnimationFrame(() => {
                notif.classList.remove('translate-y-10', 'opacity-0');
            });

            setTimeout(() => {
                notif.classList.add('translate-y-10', 'opacity-0');
                setTimeout(() => notif.remove(), 300);
            }, 3000);
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(`${tab}-view`).classList.add('active');
            
            const tabs = ['editor', 'tutorial', 'instructions'];
            tabs.forEach(t => {
                const btn = document.getElementById(`btn-${t}`);
                if (!btn) return;
                
                if (t === tab) {
                    btn.className = "flex items-center gap-2 px-4 py-2 md:px-6 rounded-t-lg font-bold transition-all border-b-2 border-green-600 bg-white text-green-600 shadow-sm whitespace-nowrap";
                } else {
                    btn.className = "flex items-center gap-2 px-4 py-2 md:px-6 rounded-t-lg font-bold transition-all border-b-2 border-transparent text-slate-500 hover:bg-slate-100 whitespace-nowrap";
                }
            });
        }

        function normalizeState() {
            let maxLen = 0;
            const cats = ['suppliers', 'inputs', 'process', 'outputs', 'customers'];
            cats.forEach(c => { if (state[c].length > maxLen) maxLen = state[c].length; });
            
            for (let i = 0; i < maxLen; i++) {
                let rowId = null;
                cats.forEach(c => { if (state[c][i] && state[c][i].id) rowId = state[c][i].id; });
                if (!rowId) rowId = Date.now() + Math.random();
                
                cats.forEach(c => {
                    if (!state[c][i]) state[c].push({ id: rowId, desc: '' });
                    else state[c][i].id = rowId;
                });
            }
        }

        function addRow() {
            const rowId = Date.now() + Math.random();
            ['suppliers', 'inputs', 'process', 'outputs', 'customers'].forEach(c => {
                state[c].push({ id: rowId, desc: '' });
            });
            render();
            saveState(true);
        }

        function removeRow(rowId) {
            ['suppliers', 'inputs', 'process', 'outputs', 'customers'].forEach(c => {
                state[c] = state[c].filter(i => i.id !== rowId);
            });
            render();
            saveState(true);
        }

        window.updateItem = function(cat, id, field, val) {
            const item = state[cat].find(i => i.id === id);
            if (item) item[field] = val;
            
            // Zapisz zmianę tekstu z opóźnieniem (nie od razu z każdą wpisaną literką)
            saveState(false);
        }

        window.autoResize = function(el) {
            el.style.height = 'auto';
            el.style.height = el.scrollHeight + 'px';
            syncHeights();
        }

        window.syncHeights = function() {
            const cats = ['suppliers', 'inputs', 'process', 'outputs', 'customers'];
            const rowCount = state.process.length;
            
            for (let i = 0; i < rowCount; i++) {
                let maxHeight = 0;
                const elements = cats.map(cat => {
                    const list = document.getElementById(`${cat}-list`);
                    return list ? list.children[i] : null;
                });
                
                elements.forEach(el => {
                    if (el) {
                        el.style.height = 'auto';
                        el.style.minHeight = '0px';
                    }
                });
                
                elements.forEach(el => {
                    if (el && el.offsetHeight > maxHeight) {
                        maxHeight = el.offsetHeight;
                    }
                });
                
                elements.forEach(el => {
                    if (el) el.style.minHeight = `${maxHeight}px`;
                });
            }
        }

        window.addEventListener('resize', () => {
            syncHeights();
        });

        function render() {
            normalizeState();
            const dict = i18n[currentLang];
            const cats = ['suppliers', 'inputs', 'process', 'outputs', 'customers'];
            
            cats.forEach(cat => {
                const list = document.getElementById(`${cat}-list`);
                list.innerHTML = '';
                state[cat].forEach((item, index) => {
                    const div = document.createElement('div');
                    
                    div.className = `group relative bg-white border border-slate-100 rounded-md p-1.5 shadow-sm mb-2 hover:border-slate-300 transition-colors focus-within:ring-2 focus-within:ring-green-100 focus-within:border-green-400 flex flex-col`;
                        
                    div.innerHTML = `
                        <button onclick="removeRow(${item.id})" title="Usuń" class="no-print absolute -top-1.5 -right-1.5 bg-white border border-slate-200 p-1.5 rounded-full text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all z-10 shadow-sm focus:opacity-100 leading-none">
                            <i class="fas fa-times text-[10px]"></i>
                        </button>
                        <textarea class="w-full text-xs font-semibold text-slate-700 focus:outline-none bg-transparent resize-none leading-relaxed placeholder-slate-300 overflow-hidden" style="min-height: 40px;" placeholder="${dict.placeholder}" oninput="window.updateItem('${cat}', ${item.id}, 'desc', this.value); window.autoResize(this)">${(item.desc || '').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</textarea>
                    `;
                    list.appendChild(div);
                });
            });

            setTimeout(() => {
                document.querySelectorAll('textarea').forEach(ta => {
                    ta.style.height = 'auto';
                    ta.style.height = ta.scrollHeight + 'px';
                });
                syncHeights();
            }, 0);
        }

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const urlLang = urlParams.get('lang');
            if(urlLang && (urlLang === 'pl' || urlLang === 'en')) {
                setLanguage(urlLang);
            } else {
                setLanguage('pl');
            }
            
            // Inicjalizacja pierwszej, pustej linii i zapis jej do historii
            addRow(); 
            // Funkcja addRow() robi to sama, więc tutaj nic nie dokładamy
        };
    </script>
