<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lean Six Sigma Mapping | System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #f8fafc;
            overflow: hidden;
        }

        .sidebar {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            width: 280px;
        }

        .sidebar.collapsed {
            width: 80px;
        }

        .sidebar.collapsed .nav-text,
        .sidebar.collapsed .logo-text,
        .sidebar.collapsed .lang-container,
        .sidebar.collapsed .footer-text {
            display: none;
        }

        .nav-link {
            transition: all 0.2s;
            position: relative;
        }

        .nav-link.active {
            background: #ecfdf5;
            color: #059669;
        }

        .nav-link.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 20%;
            height: 60%;
            width: 4px;
            background: #059669;
            border-radius: 0 4px 4px 0;
        }

        .main-content {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .bg-grid {
            background-image: radial-gradient(#bbf7d0 1px, transparent 0);
            background-size: 30px 30px;
        }

        iframe {
            border: none;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body class="bg-grid flex h-screen">

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar bg-white border-r border-emerald-100 flex flex-col z-50">
        <!-- Logo Area -->
        <div class="p-6 flex items-center gap-4 border-b border-emerald-50 h-20">
            <div onclick="resetToWelcome()" class="w-10 h-10 bg-emerald-600 rounded-xl flex items-center justify-center shrink-0 shadow-lg shadow-emerald-200 cursor-pointer hover:scale-105 transition-transform">
                <i class="fas fa-layer-group text-white"></i>
            </div>
            <div class="logo-text overflow-hidden">
                <h1 class="font-extrabold text-slate-800 leading-tight text-sm">Lean Six Sigma<br><span class="text-emerald-600">Mapping</span></h1>
            </div>
        </div>

        <!-- Language Switcher in Menu -->
        <div class="px-6 py-4 lang-container">
            <div class="flex bg-slate-100 p-1 rounded-lg border border-slate-200">
                <button onclick="setLanguage('pl')" id="lang-pl" class="flex-1 px-3 py-1 rounded-md text-xs font-bold transition-all bg-white text-emerald-600 shadow-sm">PL</button>
                <button onclick="setLanguage('en')" id="lang-en" class="flex-1 px-3 py-1 rounded-md text-xs font-bold transition-all text-slate-400 hover:text-slate-600">EN</button>
            </div>
        </div>

        <!-- Navigation -->
        <nav class="flex-grow p-4 space-y-2">
            <p class="nav-text text-[10px] font-black text-slate-400 uppercase tracking-widest px-3 mb-2" id="label-projects">Projekty</p>

            <button onclick="switchView('sipoc')" class="nav-link w-full flex items-center gap-4 p-3 rounded-xl text-slate-500 hover:bg-emerald-50 hover:text-emerald-700" id="btn-sipoc">
                <i class="fas fa-project-diagram w-6 shrink-0"></i>
                <span class="nav-text font-bold text-sm" id="nav-sipoc">SIPOC Generator</span>
            </button>

            <button onclick="switchView('flowchart')" class="nav-link w-full flex items-center gap-4 p-3 rounded-xl text-slate-500 hover:bg-emerald-50 hover:text-emerald-700" id="btn-flowchart">
                <i class="fas fa-sitemap w-6 shrink-0"></i>
                <span class="nav-text font-bold text-sm" id="nav-flowchart">Flowchart Maker</span>
            </button>

            <button onclick="switchView('vsm')" class="nav-link w-full flex items-center gap-4 p-3 rounded-xl text-slate-500 hover:bg-emerald-50 hover:text-emerald-700" id="btn-vsm">
                <i class="fas fa-chart-line w-6 shrink-0"></i>
                <span class="nav-text font-bold text-sm" id="nav-vsm">VSM Analysis</span>
            </button>
        </nav>

        <!-- Sidebar Footer -->
        <div class="p-4 border-t border-emerald-50">
            <button onclick="toggleSidebar()" class="w-full flex items-center gap-4 p-3 rounded-xl text-slate-400 hover:bg-slate-50 transition-colors">
                <i id="toggle-icon" class="fas fa-angle-double-left w-6 shrink-0"></i>
                <span class="nav-text font-bold text-sm" id="label-collapse">Zwiń menu</span>
            </button>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content flex-grow flex flex-col relative overflow-hidden">
        
        <!-- Content Container -->
        <div class="flex-grow relative overflow-hidden">
            
            <!-- Welcome Screen -->
            <div id="view-welcome-content" class="absolute inset-0 p-8 overflow-y-auto">
                <div class="max-w-6xl mx-auto py-12">
                    <div class="text-center mb-16">
                        <h1 class="text-3xl md:text-4xl font-extrabold text-slate-900 mb-4 tracking-tight">
                            <span id="welcome-title">Witaj w</span> <span class="text-transparent bg-clip-text bg-gradient-to-r from-emerald-600 to-green-600">Workspace</span>
                        </h1>
                        <p class="text-slate-500 max-w-xl mx-auto font-medium" id="welcome-desc">Wybierz narzędzie z menu po lewej stronie, aby rozpocząć optymalizację procesu.</p>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <button onclick="switchView('sipoc')" class="bg-white p-8 rounded-[2rem] border border-emerald-50 shadow-lg hover:shadow-emerald-900/10 hover:-translate-y-2 transition-all text-left group">
                            <div class="w-12 h-12 bg-emerald-600 rounded-2xl flex items-center justify-center mb-6 shadow-lg shadow-emerald-200">
                                <i class="fas fa-project-diagram text-white"></i>
                            </div>
                            <h3 class="text-lg font-bold text-slate-800 mb-2">SIPOC</h3>
                            <p class="text-xs text-slate-500 leading-relaxed mb-6" id="desc-sipoc">Definiowanie granic procesu i kluczowych interesariuszy.</p>
                            <span class="text-emerald-600 font-bold text-[10px] uppercase tracking-wider group-hover:underline" id="link-sipoc">Uruchom moduł</span>
                        </button>

                        <button onclick="switchView('flowchart')" class="bg-white p-8 rounded-[2rem] border border-emerald-50 shadow-lg hover:shadow-green-900/10 hover:-translate-y-2 transition-all text-left group">
                            <div class="w-12 h-12 bg-green-600 rounded-2xl flex items-center justify-center mb-6 shadow-lg shadow-green-200">
                                <i class="fas fa-sitemap text-white"></i>
                            </div>
                            <h3 class="text-lg font-bold text-slate-800 mb-2">Flowchart</h3>
                            <p class="text-xs text-slate-500 leading-relaxed mb-6" id="desc-flowchart">Mapowanie logiki i decyzji operacyjnych krok po kroku.</p>
                            <span class="text-green-700 font-bold text-[10px] uppercase tracking-wider group-hover:underline" id="link-flowchart">Uruchom moduł</span>
                        </button>

                        <button onclick="switchView('vsm')" class="bg-white p-8 rounded-[2rem] border border-emerald-50 shadow-lg hover:shadow-teal-900/10 hover:-translate-y-2 transition-all text-left group">
                            <div class="w-12 h-12 bg-teal-600 rounded-2xl flex items-center justify-center mb-6 shadow-lg shadow-teal-200">
                                <i class="fas fa-chart-line text-white"></i>
                            </div>
                            <h3 class="text-lg font-bold text-slate-800 mb-2">VSM</h3>
                            <p class="text-xs text-slate-500 leading-relaxed mb-6" id="desc-vsm">Analiza strumienia wartości i identyfikacja marnotrawstwa.</p>
                            <span class="text-teal-700 font-bold text-[10px] uppercase tracking-wider group-hover:underline" id="link-vsm">Uruchom moduł</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Iframe Container -->
            <div id="iframe-container" class="absolute inset-0 hidden">
                <iframe id="app-iframe" src="about:blank"></iframe>
            </div>

        </div>
    </main>

    <script>
        const sidebar = document.getElementById('sidebar');
        const toggleIcon = document.getElementById('toggle-icon');
        const welcomeContent = document.getElementById('view-welcome-content');
        const iframeContainer = document.getElementById('iframe-container');
        const appIframe = document.getElementById('app-iframe');

        const i18n = {
            pl: {
                projects: "Projekty",
                collapse: "Zwiń menu",
                welcome: "Witaj w",
                welcomeDesc: "Wybierz narzędzie z menu po lewej stronie, aby rozpocząć optymalizację procesu.",
                run: "Uruchom moduł",
                sipocTitle: "SIPOC Generator",
                flowchartTitle: "Flowchart Maker",
                vsmTitle: "VSM Analysis",
                sipocDesc: "Definiowanie granic procesu i kluczowych interesariuszy.",
                flowchartDesc: "Mapowanie logiki i decyzji operacyjnych krok po kroku.",
                vsmDesc: "Analiza strumienia wartości i identyfikacja marnotrawstwa."
            },
            en: {
                projects: "Projects",
                collapse: "Collapse menu",
                welcome: "Welcome to",
                welcomeDesc: "Select a tool from the menu on the left to start process optimization.",
                run: "Launch module",
                sipocTitle: "SIPOC Generator",
                flowchartTitle: "Flowchart Maker",
                vsmTitle: "VSM Analysis",
                sipocDesc: "Defining process boundaries and key stakeholders.",
                flowchartDesc: "Step-by-step mapping of operational logic and decisions.",
                vsmDesc: "Value stream analysis and waste identification."
            }
        };

        let currentLang = 'pl';

        function setLanguage(lang) {
            currentLang = lang;
            
            // Toggle button styles
            document.getElementById('lang-pl').className = lang === 'pl' 
                ? "flex-1 px-3 py-1 rounded-md text-xs font-bold transition-all bg-white text-emerald-600 shadow-sm"
                : "flex-1 px-3 py-1 rounded-md text-xs font-bold transition-all text-slate-400 hover:text-slate-600";
            
            document.getElementById('lang-en').className = lang === 'en' 
                ? "flex-1 px-3 py-1 rounded-md text-xs font-bold transition-all bg-white text-emerald-600 shadow-sm"
                : "flex-1 px-3 py-1 rounded-md text-xs font-bold transition-all text-slate-400 hover:text-slate-600";

            // Update UI text
            document.getElementById('label-projects').innerText = i18n[lang].projects;
            document.getElementById('label-collapse').innerText = i18n[lang].collapse;
            document.getElementById('welcome-title').innerText = i18n[lang].welcome;
            document.getElementById('welcome-desc').innerText = i18n[lang].welcomeDesc;
            
            document.getElementById('nav-sipoc').innerText = i18n[lang].sipocTitle;
            document.getElementById('nav-flowchart').innerText = i18n[lang].flowchartTitle;
            document.getElementById('nav-vsm').innerText = i18n[lang].vsmTitle;

            document.getElementById('desc-sipoc').innerText = i18n[lang].sipocDesc;
            document.getElementById('desc-flowchart').innerText = i18n[lang].flowchartDesc;
            document.getElementById('desc-vsm').innerText = i18n[lang].vsmDesc;

            const runLinks = ['link-sipoc', 'link-flowchart', 'link-vsm'];
            runLinks.forEach(id => document.getElementById(id).innerText = i18n[lang].run);
        }

        function toggleSidebar() {
            sidebar.classList.toggle('collapsed');
            if (sidebar.classList.contains('collapsed')) {
                toggleIcon.classList.replace('fa-angle-double-left', 'fa-angle-double-right');
            } else {
                toggleIcon.classList.replace('fa-angle-double-right', 'fa-angle-double-left');
            }
        }

        function switchView(view) {
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            document.getElementById(`btn-${view}`).classList.add('active');

            welcomeContent.classList.add('hidden');
            iframeContainer.classList.remove('hidden');
            appIframe.src = `${view}.html`;
        }

        function resetToWelcome() {
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            welcomeContent.classList.remove('hidden');
            iframeContainer.classList.add('hidden');
            appIframe.src = "about:blank";
        }
    </script>
</body>
</html>
