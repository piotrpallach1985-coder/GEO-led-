            }
            layer.innerHTML = html;
        }

        function centerView() {
            if (nodes.length === 0) {
                pan = { x: 0, y: 0 };
                zoom = 1;
                updateTransform();
                return;
            }
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            nodes.forEach(n => {
                const r = getNodeRect(n);
                const nx = parseFloat(n.x) || 0;
                const ny = parseFloat(n.y) || 0;
                if (nx < minX) minX = nx;
                if (ny < minY) minY = ny;
                if (nx + r.w > maxX) maxX = nx + r.w;
                if (ny + r.h > maxY) maxY = ny + r.h;
            });
            minX -= 100; minY -= 100; maxX += 100; maxY += 100;
            
            // BEZPIECZNE FALLBACKI PRZED NaN i 0
            const viewportWidth = workspaceEl.clientWidth || window.innerWidth || 800;
            const viewportHeight = workspaceEl.clientHeight || window.innerHeight || 600;
            const bboxWidth = Math.max(10, maxX - minX);
            const bboxHeight = Math.max(10, maxY - minY);
            
            const scaleX = viewportWidth / bboxWidth;
            const scaleY = viewportHeight / bboxHeight;
            zoom = Math.max(0.1, Math.min(scaleX, scaleY, 1.5));
            
            const centerX = (minX + maxX) / 2;
            const centerY = (minY + maxY) / 2;
            pan.x = viewportWidth / 2 - centerX * zoom;
            pan.y = viewportHeight / 2 - centerY * zoom;
            
            updateTransform();
        }

        function addNode(type) {
            let label = i18n[currentLang].toolText;
            if(type === 'supplier') label = i18n[currentLang].toolSupplier;
            if(type === 'process') label = i18n[currentLang].defaultProcess;
            if(type === 'inventory') label = i18n[currentLang].toolInventory;
            if(type === 'transport' || type === 'transport-int') label = i18n[currentLang].toolTransport;
            if(type === 'data') label = i18n[currentLang].toolData;
            if(type === 'kaizen') label = i18n[currentLang].defaultKaizen;
            if(type === 'text') label = i18n[currentLang].defaultText;
            if(type.startsWith('arrow')) label = '';

            const viewportW = workspaceEl.clientWidth || window.innerWidth || 800;
            const viewportH = workspaceEl.clientHeight || window.innerHeight || 600;

            const newNode = {
                id: generateId(),
                type,
                label: label,
                x: (-pan.x + viewportW / 2) / zoom - 60,
                y: (-pan.y + viewportH / 2) / zoom - 50,
                data: {}
            };

            if (type === 'inventory' || type === 'transport-int') {
                newNode.data.nva = '0 min';
            }

            if(type.startsWith('arrow-thick')) {
                newNode.width = 120; newNode.height = 50; newNode.rotation = 0;
            } else if(type === 'kaizen') {
                newNode.width = 180; newNode.height = 120; newNode.rotation = 0;
            }
            nodes.push(newNode);
            setMode('select');
            selectedNodeId = newNode.id;
            renderNodes();
            renderDynamicTimeline();
            saveHistory();
        }

        window.startTimelineDrag = function(e) {
            e.stopPropagation();
            try { e.target.setPointerCapture(e.pointerId); } catch(err){}
            isDraggingTimeline = true;
            hasMoved = false;
            lastPointerPos = { x: e.clientX, y: e.clientY };
        };

        let lastTapTime = 0;
        let lastTapNode = null;
        
        window.handleTap = function(e, el) {
            e.stopPropagation();
            const now = Date.now();
            if (now - lastTapTime < 400 && lastTapNode === el) {
                enableEdit(el);
            } else {
                const parentNode = el.closest('.vsm-node');
                if (parentNode) {
                    const id = parentNode.getAttribute('data-id');
                    handleNodePointerDown(e, id);
                }
            }
            lastTapTime = now;
            lastTapNode = el;
        };

        window.enableEdit = function(el) {
            if (el.tagName.toLowerCase() === 'input') {
                el.removeAttribute('readonly');
                el.classList.remove('cursor-pointer');
                el.classList.add('cursor-text');
                el.focus();
            } else {
                el.setAttribute('contenteditable', 'true');
                el.classList.remove('cursor-pointer');
                el.classList.add('cursor-text');
                el.focus();
                
                const range = document.createRange();
                range.selectNodeContents(el);
                const sel = window.getSelection();
                sel.removeAllRanges();
                sel.addRange(range);
            }
        };

        window.disableEdit = function(el) {
            if (el.tagName.toLowerCase() === 'input') {
                el.setAttribute('readonly', 'true');
                el.classList.add('cursor-pointer');
                el.classList.remove('cursor-text');
            } else {
                el.setAttribute('contenteditable', 'false');
                el.classList.add('cursor-pointer');
                el.classList.remove('cursor-text');
            }
            window.getSelection()?.removeAllRanges();
        };

        window.handleNodePointerDown = function(e, id) {
            e.stopPropagation();
            selectedNodeId = id;
            updateNodesRender();

            if (interactionMode.startsWith('connect')) {
                if (!connectionStart) {
                    connectionStart = id;
                    document.getElementById('connect-tooltip-text').innerText = i18n[currentLang].tooltipConnectEnd;
                    renderNodes();
                } else {
                    if (connectionStart !== id) {
                        const edgeType = interactionMode === 'connect-zigzag' ? 'zigzag' : 'straight';
                        edges.push({ id: generateId(), source: connectionStart, target: id, type: edgeType });
                        saveHistory();
                    }
                    connectionStart = null;
                    setMode('select');
                    renderEdges();
                    renderNodes();
                }
            }
        };

        window.startNodeDrag = function(e, id) {
            e.stopPropagation();
            selectedNodeId = id;
            updateNodesRender();
            try { e.target.setPointerCapture(e.pointerId); } catch(err){}
            draggingNode = id;
            const n = nodes.find(x => x.id === id);
            if(n) { dragVirtualX = parseFloat(n.x)||0; dragVirtualY = parseFloat(n.y)||0; }
            hasMoved = false;
            lastPointerPos = { x: e.clientX, y: e.clientY };
        };

        window.startResize = function(e, id) {
            e.stopPropagation();
            try { e.target.setPointerCapture(e.pointerId); } catch(err){}
            isResizingNode = id;
            selectedNodeId = id;
            hasMoved = false;
            lastPointerPos = { x: e.clientX, y: e.clientY };
            updateNodesRender();
        };

        window.startRotate = function(e, id) {
            e.stopPropagation();
            try { e.target.setPointerCapture(e.pointerId); } catch(err){}
            isRotatingNode = id;
            selectedNodeId = id;
            hasMoved = false;
            lastPointerPos = { x: e.clientX, y: e.clientY };
            updateNodesRender();
        };

        window.deleteNode = function(id) {
            if (selectedNodeId === id) selectedNodeId = null;
            nodes = nodes.filter(n => n.id !== id);
            edges = edges.filter(e => e.source !== id && e.target !== id);
            renderNodes();
            renderEdges();
            renderDynamicTimeline();
            saveHistory();
        };

        window.updateNodeLabelWithoutRender = function(id, value) {
            const node = nodes.find(n => n.id === id);
            if(node) node.label = value;
            const el = document.querySelector(`.vsm-node[data-id="${id}"] .kaizen-text-box`);
            if(el) {
                if(value.trim() === '') {
                    el.classList.remove('bg-white/90', 'border-yellow-400', 'shadow-sm');
                    el.classList.add('bg-transparent', 'border-transparent');
                } else {
                    el.classList.add('bg-white/90', 'border-yellow-400', 'shadow-sm');
                    el.classList.remove('bg-transparent', 'border-transparent');
                }
            }
        };
        
        window.updateNodeLabel = function(id, value) {
            const node = nodes.find(n => n.id === id);
            if(node) node.label = value;
        };

        window.updateNodeData = function(id, field, value) {
            const node = nodes.find(n => n.id === id);
            if(node) node.data[field] = value;
            if(field === 'ct' || field === 'nva') renderDynamicTimeline();
        };

        window.deleteEdge = function(id) {
            edges = edges.filter(e => e.id !== id);
            renderEdges();
            saveHistory();
        };

        function drawZigzagPath(x1, y1, x2, y2) {
            const dx = x2 - x1;
            const dy = y2 - y1;
            const len = Math.sqrt(dx*dx + dy*dy);
            if (len < 30) return `M ${x1} ${y1} L ${x2} ${y2}`;
            const nx = -dy / len;
            const ny = dx / len;
            const offset = 20; 
            const zigPos = 0.35; 
            const zx = x1 + dx * zigPos;
            const zy = y1 + dy * zigPos;
            const p1x = zx + nx * offset - (dx/len)*10;
            const p1y = zy + ny * offset - (dy/len)*10;
            const p2x = zx - nx * offset + (dx/len)*10;
            const p2y = zy - ny * offset + (dy/len)*10;
            return `M ${x1} ${y1} L ${p1x} ${p1y} L ${p2x} ${p2y} L ${x2} ${y2}`;
        }

        window.renderDynamicTimeline = function() {
            const flowNodes = nodes.filter(n => n.type === 'process' || n.type === 'inventory' || n.type === 'transport-int').sort((a,b) => (parseFloat(a.x)||0) - (parseFloat(b.x)||0));
            const layer = document.getElementById('timeline-layer');
            const labelsLayer = document.getElementById('timeline-labels');
            const dragLayer = document.getElementById('timeline-drag-layer');
            
            if (flowNodes.length === 0) {
                if(layer) layer.innerHTML = '';
                if(labelsLayer) labelsLayer.innerHTML = '';
                if(dragLayer) dragLayer.innerHTML = '';
                return;
            }

            let baseMaxY = 300;
            const mainNodes = nodes.filter(n => ['process', 'supplier', 'data'].includes(n.type));
            if (mainNodes.length > 0) baseMaxY = Math.max(...mainNodes.map(n => (parseFloat(n.y)||0) + (n.height || (n.type === 'process' ? 180 : 120))));
            
            const yBottom = customTimelineY !== null ? customTimelineY : baseMaxY + 80;
            const yTop = yBottom - 40;

            let pathD = "";
            let labelsHtml = "";
            let guidesHtml = "";
            let sumVA = 0; let sumNVA = 0;

            let currentX = (parseFloat(flowNodes[0].x)||0) - 50;
            pathD += `M ${currentX} ${yTop} `;

            guidesHtml += `
                <g class="pointer-events-auto cursor-ns-resize print-hide" onpointerdown="startTimelineDrag(event)">
                    <rect x="${currentX - 50}" y="${yTop - 15}" width="30" height="30" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" rx="6" />
                    <line x1="${currentX - 42}" y1="${yTop - 5}" x2="${currentX - 28}" y2="${yTop - 5}" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
                    <line x1="${currentX - 42}" y1="${yTop}" x2="${currentX - 28}" y2="${yTop}" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
                    <line x1="${currentX - 42}" y1="${yTop + 5}" x2="${currentX - 28}" y2="${yTop + 5}" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
                </g>
            `;

            flowNodes.forEach((node) => {
                const nx = parseFloat(node.x) || 0;
                const ny = parseFloat(node.y) || 0;
                const w = node.width || getNodeRect(node).w;
                const centerX = nx + w/2;
                
                if (node.type === 'process') {
                    guidesHtml += `<line x1="${centerX}" y1="${ny + (node.height||180)-5}" x2="${centerX}" y2="${yTop}" stroke="#cbd5e1" stroke-dasharray="6 4" stroke-width="1.5" />`;

                    pathD += `L ${nx} ${yTop} `;
                    pathD += `L ${nx} ${yBottom} `;
                    pathD += `L ${nx + w} ${yBottom} `;
                    pathD += `L ${nx + w} ${yTop} `;
                    
                    const valStr = node.data.ct || '10 min';
                    sumVA += parseTime(valStr);
                    labelsHtml += `<div class="absolute text-center text-[11px] font-bold text-emerald-700 bg-white/80 px-1" style="left: ${nx}px; top: ${yBottom + 5}px; width: ${w}px;">${valStr}</div>`;
                } else if (node.type === 'inventory' || node.type === 'transport-int') {
                    guidesHtml += `<line x1="${centerX}" y1="${ny + (node.height||100)-5}" x2="${centerX}" y2="${yTop}" stroke="#cbd5e1" stroke-dasharray="6 4" stroke-width="1.5" />`;

                    pathD += `L ${centerX} ${yTop} `;
                    
                    const valStr = node.data.nva || '0 min';
                    sumNVA += parseTime(valStr);
                    labelsHtml += `<div class="absolute text-center text-[11px] font-bold text-slate-600 bg-white/80 px-1" style="left: ${centerX - 40}px; top: ${yTop - 20}px; width: 80px;">${valStr}</div>`;
                }
            });

            const lastN = flowNodes[flowNodes.length-1];
            const endX = (parseFloat(lastN.x)||0) + (lastN.width||150) + 70;
            pathD += `L ${endX} ${yTop}`;
            guidesHtml += `<polygon points="${endX},${yTop-7} ${endX},${yTop+7} ${endX+14},${yTop}" fill="#0f766e" />`;

            const upArrowX = endX - 30;
            const upArrowY = yTop - 60;
            guidesHtml += `<polygon points="${upArrowX-12},${upArrowY} ${upArrowX-12},${upArrowY-50} ${upArrowX-24},${upArrowY-50} ${upArrowX},${upArrowY-80} ${upArrowX+24},${upArrowY-50} ${upArrowX+12},${upArrowY-50} ${upArrowX+12},${upArrowY}" fill="#cbd5e1" />`;

            const summaryTitle = currentLang === 'pl' ? 'Podsumowanie Sumaryczne' : 'Summary';
            
            let pce = 0;
            let totalTime = sumVA + sumNVA;
            if(totalTime > 0) {
                pce = ((sumVA / totalTime) * 100).toFixed(2);
            }
            
            labelsHtml += `
            <div class="absolute text-left border border-slate-300 bg-white/95 px-3 py-2 rounded shadow-sm backdrop-blur-sm pointer-events-auto cursor-ns-resize timeline-drag-area" style="left: ${endX + 30}px; top: ${yTop - 50}px; min-width: 250px;" onpointerdown="startTimelineDrag(event)">
                <div class="text-[10px] font-bold text-slate-400 uppercase tracking-wider border-b border-slate-100 pb-1 mb-1.5">${summaryTitle}</div>
                <div class="text-[12px] font-bold text-slate-600 mb-0.5 flex justify-between"><span>Lead Time (NVA):</span> <span class="text-slate-800 ml-2 text-right">${formatTimeDetailed(sumNVA, currentLang)}</span></div>
                <div class="text-[12px] font-bold text-slate-600 flex justify-between mb-0.5"><span>Process Time (VA):</span> <span class="text-emerald-600 ml-2 text-right">${formatTimeDetailed(sumVA, currentLang)}</span></div>
                <div class="text-[12px] font-bold text-slate-600 flex justify-between border-t border-slate-200 mt-1 pt-1"><span id="lbl-pce">${i18n[currentLang].pceTitle}</span> <span class="text-blue-600 ml-2 text-right">${pce}%</span></div>
            </div>`;

            if(layer) layer.innerHTML = `${guidesHtml} <path d="${pathD}" fill="none" stroke="#0f766e" stroke-width="2.5" />`;
            if(dragLayer) dragLayer.innerHTML = `<path d="${pathD}" fill="none" stroke="transparent" stroke-width="40" class="pointer-events-auto cursor-ns-resize timeline-drag-area" onpointerdown="startTimelineDrag(event)" />`;
            if(labelsLayer) labelsLayer.innerHTML = labelsHtml;
        };

        window.setMode = function(mode) {
            interactionMode = mode;
            connectionStart = null;
            ['select', 'connect-straight', 'connect-zigzag'].forEach(m => {
                const btn = document.getElementById(`btn-mode-${m}`);
                if(m === mode) {
                    btn.className = "w-full flex items-center gap-3 px-3 py-2 rounded transition-colors border text-sm bg-emerald-50 border-emerald-400 text-emerald-800 font-bold mt-1";
                } else {
                    btn.className = "w-full flex items-center gap-3 px-3 py-2 rounded transition-colors border text-sm bg-white border-slate-200 text-slate-600 hover:bg-slate-50 mt-1 font-medium";
                }
            });

            const tooltip = document.getElementById('connect-tooltip');
            if(mode.startsWith('connect')) {
                workspaceEl.classList.remove('cursor-grab');
                workspaceEl.classList.add('cursor-crosshair');
                tooltip.classList.remove('hidden');
                document.getElementById('connect-tooltip-text').innerText = i18n[currentLang].tooltipConnectStart;
            } else {
                workspaceEl.classList.add('cursor-grab');
                workspaceEl.classList.remove('cursor-crosshair');
                tooltip.classList.add('hidden');
            }
            updateNodesRender();
        };

        function renderEdges() {
            let svgHtml = '';
            edges.forEach(edge => {
                const sourceNode = nodes.find(n => n.id === edge.source);
                const targetNode = nodes.find(n => n.id === edge.target);
                if (!sourceNode || !targetNode) return;

                const r1 = getNodeRect(sourceNode);
                const r2 = getNodeRect(targetNode);

                const startX = r1.cx;
                const startY = r1.cy;
                const endX = r2.cx;
                const endY = r2.cy;

                const isZigzag = edge.type === 'zigzag';
                const strokeColor = isZigzag ? "#10b981" : "#475569";

                const pathOrLine = isZigzag 
                    ? `<path d="${drawZigzagPath(startX, startY, endX, endY)}" stroke="${strokeColor}" fill="none" stroke-width="2.5" class="group-hover:stroke-red-500 transition-colors" />`
                    : `<line x1="${startX}" y1="${startY}" x2="${endX}" y2="${endY}" stroke="${strokeColor}" stroke-width="3.5" class="group-hover:stroke-red-500 transition-colors" />`;

                const mx = (startX + endX) / 2;
                const my = (startY + endY) / 2;
                const angle = Math.atan2(endY - startY, endX - startX) * (180 / Math.PI);
                const arrowheadHtml = `<polygon points="-10,-8 12,0 -10,8" fill="${strokeColor}" transform="translate(${mx}, ${my}) rotate(${angle})" class="pointer-events-none group-hover:fill-red-500 transition-colors" />`;

                svgHtml += `
                    <g class="pointer-events-auto cursor-pointer group" onpointerdown="deleteEdge('${edge.id}')">
                        <line x1="${startX}" y1="${startY}" x2="${endX}" y2="${endY}" stroke="transparent" stroke-width="20" />
                        ${pathOrLine}
                        ${arrowheadHtml}
                        <circle cx="${mx}" cy="${my}" r="16" class="fill-white opacity-0 group-hover:opacity-100 stroke-red-500" />
                        <svg x="${mx - 8}" y="${my - 8}" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2.5" class="opacity-0 group-hover:opacity-100 pointer-events-none">
                            <path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
                        </svg>
                    </g>
                `;
            });
            edgesGroup.innerHTML = svgHtml;
        }

        // Pomocnicza funkcja do generowania pól czasowych (Input Tekstowy)
        function renderTimeField(node, field, defaultValue, labelStr) {
            const val = node.data[field] !== undefined ? node.data[field] : defaultValue;
            return `
            <div class="flex justify-between items-center px-2 py-1 bg-transparent border-b border-slate-200 cursor-text">
                <span class="font-medium text-slate-600">${labelStr}:</span>
                <input type="text" class="w-16 text-right bg-transparent outline-none font-bold text-slate-800 cursor-pointer" value="${val}" oninput="updateNodeData('${node.id}', '${field}', this.value)" readonly onpointerdown="handleTap(event, this)" onblur="disableEdit(this); saveHistory()">
            </div>
            `;
        }

        function updateNodesRender() {
            document.querySelectorAll('.vsm-node').forEach(el => {
                const id = el.getAttribute('data-id');
                const type = el.getAttribute('data-type');
                const isSelected = selectedNodeId === id;
                const isKaizen = type === 'kaizen';
                const isProcess = type === 'process';
                const isInventory = type === 'inventory' || type === 'transport-int';
                const isText = type === 'text';
                const isThickArrow = type && type.startsWith('arrow-thick');
                
                let baseClasses = `vsm-node absolute flex flex-col p-2 transition-colors `;
                
                if (isProcess) {
                    baseClasses = `vsm-node absolute flex flex-col shadow-sm transition-colors bg-white border border-slate-300 `;
                } else if (isInventory) {
                    baseClasses = `vsm-node absolute flex flex-col items-center justify-center transition-colors `;
                } else if (isThickArrow || isKaizen) {
                    baseClasses = `vsm-node absolute flex flex-col transition-colors `;
                } else if(isText) {
                    baseClasses += `bg-transparent border-none shadow-none p-0 `;
                } else {
                    baseClasses += `bg-white rounded-xl shadow-sm border border-slate-200 border-t-[4px] border-t-emerald-500 items-start px-3 py-3 `;
                }
                
                baseClasses += interactionMode.startsWith('connect') ? 'cursor-crosshair ' : '';

                if (isSelected) {
                    baseClasses += 'ring-4 ring-blue-400 z-20 ';
                    if (isInventory) baseClasses += 'bg-white/50 rounded ';
                    if (isKaizen) baseClasses += 'rounded-xl ';
                    if (isThickArrow) baseClasses += 'ring-offset-2 ring-offset-slate-50 ';
                    if (isProcess) baseClasses += 'border-blue-500 ';
                    if (isText) baseClasses += 'rounded ';
                } else if (connectionStart === id) {
                    baseClasses += isKaizen || isText || isThickArrow ? '' : 'ring-4 ring-emerald-100 border-emerald-500 shadow-md z-20 ';
                } else if (!isKaizen && !isText && !isThickArrow && interactionMode.startsWith('connect')) {
                    baseClasses += 'hover:ring-2 hover:ring-emerald-200 hover:shadow-md ';
                }
                
                el.className = baseClasses;
            });
            
            document.querySelectorAll('.resize-handles').forEach(el => {
                const parentId = el.closest('.vsm-node').getAttribute('data-id');
                if(selectedNodeId === parentId) {
                    el.classList.remove('hidden');
                } else {
                    el.classList.add('hidden');
                }
            });

            // Toggle drag/delete buttons for nodes
            document.querySelectorAll('.vsm-drag-btn, .vsm-delete-btn').forEach(btn => {
                const parentId = btn.closest('.vsm-node').getAttribute('data-id');
                if(selectedNodeId === parentId) {
                    btn.classList.remove('opacity-0', 'pointer-events-none', 'hidden');
                    if (btn.classList.contains('w-[2px]')) {
                        btn.classList.add('block');
                    } else {
                        btn.classList.add('flex');
                    }
                } else {
                    btn.classList.add('hidden');
                    btn.classList.remove('flex', 'block');
                }
            });
        }

        function renderNodes() {
            let html = '';
            nodes.forEach(node => {
                const isSelected = selectedNodeId === node.id;
                const isKaizen = node.type === 'kaizen';
                const isProcess = node.type === 'process';
                const isInventory = node.type === 'inventory';
                const isTransportInt = node.type === 'transport-int';
                const isText = node.type === 'text';
                const isThickArrow = node.type && node.type.startsWith('arrow-thick');
                
                const w = node.width || getNodeRect(node).w;
                const h = node.height || getNodeRect(node).h;
                const rot = node.rotation || 0;
                const nx = parseFloat(node.x) || 0;
                const ny = parseFloat(node.y) || 0;

                const showControls = isSelected ? 'flex' : 'hidden';

                // Krzyżyk PRZESUWANIA (w lewym górnym rogu)
                const dragBtnHtml = `
                    <button class="vsm-drag-btn absolute -top-4 -left-4 md:-top-3 md:-left-3 bg-white border border-slate-200 text-slate-600 rounded-full p-2 md:p-1.5 ${showControls} transition-opacity hover:bg-slate-100 z-40 shadow-md print-hide items-center justify-center" onpointerdown="startNodeDrag(event, '${node.id}')" title="Przesuń element">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 9l-3 3 3 3M9 5l3-3 3 3M19 9l3 3-3 3M9 19l3 3 3 3M2 12h20M12 2v20"/></svg>
                    </button>
                `;
                // Kosz USUWANIA (w prawym górnym rogu)
                const deleteBtnHtml = `
                    <button class="vsm-delete-btn absolute -top-4 -right-4 md:-top-3 md:-right-3 bg-white border border-red-200 text-red-500 rounded-full p-2 md:p-1.5 ${showControls} transition-opacity hover:bg-red-500 hover:text-white hover:border-red-500 z-40 shadow-md print-hide items-center justify-center" onpointerdown="event.stopPropagation(); deleteNode('${node.id}')" title="Usuń element">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                    </button>
                `;
                // Uchwyt SKALOWANIA (w prawym dolnym rogu)
                const resizeBtnHtml = `
                    <div class="resize-handles ${showControls} absolute -right-3 -bottom-3 w-6 h-6 bg-blue-500 border-2 border-white rounded-full cursor-se-resize z-40 shadow-md print-hide items-center justify-center text-white" onpointerdown="startResize(event, '${node.id}')" title="Zmień rozmiar">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 15 21 21 15 21"/><line x1="21" y1="21" x2="13" y2="13"/></svg>
                    </div>
                `;

                if (isProcess) {
                    let nodeClass = `vsm-node absolute flex flex-col shadow-sm transition-colors bg-white border border-slate-300 `;
                    if (isSelected) nodeClass += 'ring-4 ring-blue-400 border-blue-500 z-20 ';

                    html += `
                    <div class="${nodeClass}" style="left: ${nx}px; top: ${ny}px; width: ${w}px; min-height: ${h}px;" data-id="${node.id}" data-type="${node.type}" onpointerdown="handleNodePointerDown(event, '${node.id}')">
                        ${dragBtnHtml}
                        ${deleteBtnHtml}
                        ${resizeBtnHtml}
                        <div class="bg-teal-600 w-full text-white font-bold text-center py-1.5 px-1 min-h-[40px] flex items-center justify-center">
                            <input type="text" class="bg-transparent text-center w-full outline-none text-white text-[11px] leading-tight cursor-pointer" value="${node.label}" oninput="updateNodeLabel('${node.id}', this.value)" readonly onpointerdown="handleTap(event, this)" onblur="disableEdit(this); saveHistory()">
                        </div>
                        <div class="flex justify-between px-2 py-1 bg-slate-100 text-[11px] border-b border-slate-200 cursor-text">
                            <span class="font-medium text-slate-600">FTE:</span><input type="text" class="w-12 text-right bg-transparent outline-none font-bold text-slate-800 cursor-pointer" value="${node.data.fte||'1'}" oninput="updateNodeData('${node.id}', 'fte', this.value)" readonly onpointerdown="handleTap(event, this)" onblur="disableEdit(this); saveHistory()">
                        </div>
                        ${renderTimeField(node, 'ct', '10 min', 'C/T')}
                        <div class="flex justify-between px-2 py-1 bg-slate-100 text-[11px] border-b border-slate-200 cursor-text">
                            <span class="font-medium text-slate-600">RFT:</span><input type="text" class="w-12 text-right bg-transparent outline-none font-bold text-slate-800 cursor-pointer" value="${node.data.rft||'85%'}" oninput="updateNodeData('${node.id}', 'rft', this.value)" readonly onpointerdown="handleTap(event, this)" onblur="disableEdit(this); saveHistory()">
                        </div>
                        <div class="flex justify-between px-2 py-1 bg-white text-[11px] border-b border-slate-200 cursor-text">
                            <span class="font-medium text-slate-600">Batch:</span><input type="text" class="w-12 text-right bg-transparent outline-none font-bold text-slate-800 cursor-pointer" value="${node.data.batch||'1'}" oninput="updateNodeData('${node.id}', 'batch', this.value)" readonly onpointerdown="handleTap(event, this)" onblur="disableEdit(this); saveHistory()">
                        </div>
                        <div class="flex justify-between px-2 py-1 bg-slate-100 text-[11px] cursor-text">
                            <span class="font-medium text-slate-600">Uptime:</span><input type="text" class="w-12 text-right bg-transparent outline-none font-bold text-slate-800 cursor-pointer" value="${node.data.uptime||'90%'}" oninput="updateNodeData('${node.id}', 'uptime', this.value)" readonly onpointerdown="handleTap(event, this)" onblur="disableEdit(this); saveHistory()">
                        </div>
                    </div>
                    `;
                } else if (isInventory) {
                    let nodeClass = `vsm-node absolute flex flex-col items-center justify-center transition-colors `;
                    if (isSelected) nodeClass += 'ring-4 ring-blue-400 bg-white/50 rounded z-20 ';
                    
                    html += `
                    <div class="${nodeClass}" style="left: ${nx}px; top: ${ny}px; width: ${w}px; height: ${h}px;" data-id="${node.id}" data-type="${node.type}" onpointerdown="handleNodePointerDown(event, '${node.id}')">
                        ${dragBtnHtml}
                        ${deleteBtnHtml}
                        ${resizeBtnHtml}
                        <div class="relative w-full flex-1 flex items-center justify-center min-h-0">
                            <svg viewBox="0 0 100 100" preserveAspectRatio="none" class="w-full h-full text-slate-400 fill-slate-200 stroke-[3px] drop-shadow-sm"><polygon points="50,15 90,85 10,85"></polygon></svg>
                            <input type="text" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-[20%] w-3/4 text-center bg-transparent text-sm font-bold text-slate-700 outline-none cursor-pointer" value="${node.data.inventory||'3'}" oninput="updateNodeData('${node.id}', 'inventory', this.value)" readonly onpointerdown="handleTap(event, this)" onblur="disableEdit(this); saveHistory()">
                        </div>
                        <div class="mt-2 w-full text-center shrink-0">
                             <input type="text" class="w-full text-center text-[11px] font-bold text-slate-600 bg-transparent border-b border-transparent focus:border-slate-400 outline-none cursor-pointer" value="${node.data.nva || '0 min'}" title="Czas oczekiwania (NVA)" oninput="updateNodeData('${node.id}', 'nva', this.value)" readonly onpointerdown="handleTap(event, this)" onblur="disableEdit(this); saveHistory()">
                        </div>
                    </div>
                    `;
                } else if (isTransportInt) {
                    let nodeClass = `vsm-node absolute flex flex-col items-center justify-center transition-colors `;
                    if (isSelected) nodeClass += 'ring-4 ring-blue-400 bg-white/50 rounded z-20 ';
                    
                    html += `
                    <div class="${nodeClass}" style="left: ${nx}px; top: ${ny}px; width: ${w}px; height: ${h}px;" data-id="${node.id}" data-type="${node.type}" onpointerdown="handleNodePointerDown(event, '${node.id}')">
                        ${dragBtnHtml}
                        ${deleteBtnHtml}
                        ${resizeBtnHtml}
                        <div class="relative w-full flex-1 flex items-center justify-center text-orange-500 bg-orange-50 rounded-full border-2 border-orange-200 shadow-inner min-h-0">
                            <svg width="50%" height="50%" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h2l2 12h10l2-8H7"></path><circle cx="9" cy="20" r="2"></circle><circle cx="16" cy="20" r="2"></circle></svg>
                        </div>
                        <div class="mt-2 w-full text-center shrink-0">
                             <input type="text" class="w-full text-center text-[11px] font-bold text-slate-600 bg-transparent border-b border-transparent focus:border-slate-400 outline-none cursor-pointer" value="${node.data.nva || '0 min'}" title="Czas transportu (NVA)" oninput="updateNodeData('${node.id}', 'nva', this.value)" readonly onpointerdown="handleTap(event, this)" onblur="disableEdit(this); saveHistory()">
                        </div>
                    </div>
                    `;
                } else if (isText) {
                    let nodeClass = `vsm-node absolute flex flex-col p-0 transition-colors bg-white/20 backdrop-blur-sm shadow-sm `;
                    if (isSelected) nodeClass += 'ring-2 ring-blue-400 z-20 rounded ';

                    html += `
                    <div class="${nodeClass}" style="left: ${nx}px; top: ${ny}px; min-width: 100px;" data-id="${node.id}" data-type="${node.type}">
                        ${dragBtnHtml}
                        ${deleteBtnHtml}
                        ${resizeBtnHtml}
                        <div contenteditable="false" class="outline-none w-full min-h-[30px] text-slate-800 px-3 py-2 font-bold bg-transparent cursor-pointer whitespace-pre-wrap break-words leading-tight" oninput="updateNodeLabelWithoutRender('${node.id}', this.innerText)" onpointerdown="handleTap(event, this)" onblur="disableEdit(this); saveHistory()">${node.label}</div>
                    </div>
                    `;
                } else if (isKaizen) {
                    let nodeClass = `vsm-node absolute flex flex-col transition-colors `;
                    if (isSelected) nodeClass += 'ring-4 ring-blue-400 z-20 rounded-xl ';
                    
                    const textContent = node.label.trim();
                    const textBgClass = textContent === '' ? 'bg-transparent border-transparent' : 'bg-white/90 border-yellow-400 shadow-sm';

                    html += `
                    <div class="${nodeClass}" style="left: ${nx}px; top: ${ny}px; width: ${w}px; height: ${h}px; transform: rotate(${rot}deg); transform-origin: center center;" data-id="${node.id}" data-type="${node.type}" onpointerdown="handleNodePointerDown(event, '${node.id}')">
                        
                        ${dragBtnHtml}
                        ${deleteBtnHtml}
                        ${resizeBtnHtml}
                        
                        <div class="w-full flex justify-center z-10 mb-1 relative pointer-events-none">
                            <div contenteditable="false" class="kaizen-text-box pointer-events-auto ${textBgClass} border px-3 py-2 rounded-md text-[11px] font-bold text-red-800 outline-none text-center min-w-[50px] max-w-[200px] break-words whitespace-pre-wrap cursor-pointer transition-colors" oninput="updateNodeLabelWithoutRender('${node.id}', this.innerText)" onpointerdown="handleTap(event, this)" onblur="disableEdit(this); saveHistory()">${node.label}</div>
                        </div>

                        <div class="relative flex-1 w-full pointer-events-none drop-shadow-md min-h-0">
                            <svg preserveAspectRatio="none" viewBox="0 0 100 100" class="absolute inset-0 w-full h-full z-0">
                                <polygon points="50,0 60,18 95,15 75,35 95,55 60,52 50,70 40,52 5,55 25,35 5,15 40,18" fill="rgba(253, 224, 71, 0.4)" stroke="#ca8a04" stroke-width="2"/>
                            </svg>
                        </div>
                    </div>
                    `;
                } else if (isThickArrow) {
                    let nodeClass = `vsm-node absolute flex items-center justify-center transition-colors `;
                    if (isSelected) nodeClass += 'ring-2 ring-blue-400 ring-offset-2 ring-offset-slate-50 z-20 rounded ';
                    
                    const isPush = node.type === 'arrow-thick-push';
                    const fillStyle = isPush ? `url(#stripes-${node.id})` : 'transparent';
                    const defs = isPush ? `<defs><pattern id="stripes-${node.id}" width="12" height="40" patternUnits="userSpaceOnUse" patternTransform="rotate(20)"><rect width="6" height="40" fill="#334155"/><rect x="6" width="6" height="40" fill="#ffffff"/></pattern></defs>` : '';
                    
                    const rotateBtnHtml = `
                        <div class="resize-handles ${showControls} absolute -top-8 left-1/2 -translate-x-1/2 w-6 h-6 bg-blue-500 border-2 border-white rounded-full cursor-grab z-40 shadow-md print-hide items-center justify-center text-white" onpointerdown="startRotate(event, '${node.id}')" title="Obróć">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.59-8.5l-3.35 3.35"/></svg>
                        </div>
                        <div class="resize-handles ${isSelected ? 'block' : 'hidden'} absolute -top-4 left-1/2 -translate-x-1/2 w-[2px] h-4 bg-blue-500 z-30 print-hide"></div>
                    `;

                    html += `
                    <div class="${nodeClass}" style="left: ${nx}px; top: ${ny}px; width: ${w}px; height: ${h}px; transform: rotate(${rot}deg); transform-origin: center center;" data-id="${node.id}" data-type="${node.type}" onpointerdown="handleNodePointerDown(event, '${node.id}')">
                        ${rotateBtnHtml}
                        ${dragBtnHtml}
                        ${deleteBtnHtml}
                        ${resizeBtnHtml}
                        
                        <svg width="100%" height="100%" viewBox="0 0 100 100" preserveAspectRatio="none" class="drop-shadow-sm pointer-events-none">
                            ${defs}
                            <polygon points="0,25 60,25 60,0 100,50 60,100 60,75 0,75" fill="${fillStyle}" stroke="#334155" stroke-width="3" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    `;
                } else {
                    let nodeClass = `vsm-node absolute flex flex-col p-2 transition-colors `;
                    nodeClass += `bg-white rounded-xl shadow-sm border border-slate-200 border-t-[4px] border-t-emerald-500 items-start px-3 py-3 `;

                    if (isSelected) nodeClass += 'ring-4 ring-blue-400 border-blue-500 z-20 ';

                    let extraFields = '';
                    if(node.type === 'supplier') {
                        extraFields = `
                            <div class="w-full flex flex-col gap-1.5 mt-3">
                                <input type="text" class="w-full text-left text-[10px] font-medium text-slate-500 bg-slate-50 border-b border-slate-200 hover:bg-emerald-50 focus:bg-emerald-50 focus:border-emerald-500 focus:text-slate-800 px-1 py-2 md:py-1 outline-none transition-colors cursor-pointer" placeholder="Nazwa elementu..." value="${node.data.product || ''}" oninput="updateNodeData('${node.id}', 'product', this.value)" readonly onpointerdown="handleTap(event, this)" onblur="disableEdit(this); saveHistory()">
                                <input type="text" class="w-full text-left text-[10px] text-slate-400 bg-transparent border-b border-transparent hover:bg-emerald-50 focus:bg-emerald-50 focus:border-emerald-500 px-1 py-2 md:py-1 outline-none transition-colors cursor-pointer" placeholder="Szczegóły / ilość..." value="${node.data.quantity || ''}" oninput="updateNodeData('${node.id}', 'quantity', this.value)" readonly onpointerdown="handleTap(event, this)" onblur="disableEdit(this); saveHistory()">
                            </div>
                        `;
                    } else if(node.type === 'data') {
                        extraFields = `
                            <div class="w-full flex flex-col gap-1 mt-3 border-t border-slate-100 pt-2">
                                <div class="flex justify-between items-center"><span class="text-[9px] font-bold text-slate-400 uppercase">C/T</span><input type="text" class="w-16 text-right text-[10px] font-bold bg-transparent outline-none border-b border-slate-200 focus:border-emerald-500 focus:bg-emerald-50 text-slate-700 px-1 py-1 md:py-0 cursor-pointer" placeholder="s" value="${node.data.ct || ''}" oninput="updateNodeData('${node.id}', 'ct', this.value)" readonly onpointerdown="handleTap(event, this)" onblur="disableEdit(this); saveHistory()"></div>
                                <div class="flex justify-between items-center"><span class="text-[9px] font-bold text-slate-400 uppercase">C/O</span><input type="text" class="w-16 text-right text-[10px] font-bold bg-transparent outline-none border-b border-slate-200 focus:border-emerald-500 focus:bg-emerald-50 text-slate-700 px-1 py-1 md:py-0 cursor-pointer" placeholder="min" value="${node.data.co || ''}" oninput="updateNodeData('${node.id}', 'co', this.value)" readonly onpointerdown="handleTap(event, this)" onblur="disableEdit(this); saveHistory()"></div>
                                <div class="flex justify-between items-center"><span class="text-[9px] font-bold text-slate-400 uppercase">Uptime</span><input type="text" class="w-16 text-right text-[10px] font-bold bg-transparent outline-none border-b border-slate-200 focus:border-emerald-500 focus:bg-emerald-50 text-slate-700 px-1 py-1 md:py-0 cursor-pointer" placeholder="%" value="${node.data.uptime || ''}" oninput="updateNodeData('${node.id}', 'uptime', this.value)" readonly onpointerdown="handleTap(event, this)" onblur="disableEdit(this); saveHistory()"></div>
                                <div class="flex justify-between items-center"><span class="text-[9px] font-bold text-slate-400 uppercase">Zmiany</span><input type="text" class="w-16 text-right text-[10px] font-bold bg-transparent outline-none border-b border-slate-200 focus:border-emerald-500 focus:bg-emerald-50 text-slate-700 px-1 py-1 md:py-0 cursor-pointer" placeholder="ilość" value="${node.data.shifts || ''}" oninput="updateNodeData('${node.id}', 'shifts', this.value)" readonly onpointerdown="handleTap(event, this)" onblur="disableEdit(this); saveHistory()"></div>
                            </div>
                        `;
                    }

                    html += `
                    <div class="${nodeClass}" style="left: ${nx}px; top: ${ny}px; width: ${w}px; min-height: ${h}px;" data-id="${node.id}" data-type="${node.type}" onpointerdown="handleNodePointerDown(event, '${node.id}')">
                        ${dragBtnHtml}
                        ${deleteBtnHtml}
                        ${resizeBtnHtml}
                        <div class="flex items-center justify-center mb-1 text-emerald-600 pointer-events-none ${node.type === 'transport' ? 'w-full' : ''}">
                            ${nodeIcons[node.type] || ''}
                        </div>
                        <input type="text" class="w-full ${node.type === 'transport' ? 'text-center' : 'text-left'} text-[11px] font-extrabold text-slate-800 bg-transparent border-b border-transparent focus:border-emerald-400 focus:bg-emerald-50 outline-none z-10 transition-colors uppercase tracking-wide cursor-pointer py-1 md:py-0 pointer-events-auto" value="${node.label}" oninput="updateNodeLabel('${node.id}', this.value)" readonly onpointerdown="handleTap(event, this)" onblur="disableEdit(this); saveHistory()">
                        ${extraFields}
                    </div>
                    `;
                }
            });
            nodesLayer.innerHTML = html;
        }

        renderDynamicTimeline();
    </script>
</body>
</html>
