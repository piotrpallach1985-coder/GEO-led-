<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VSM Module</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .scrollbar-thin::-webkit-scrollbar { width: 4px; height: 4px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: #10b981; }
        
        .no-select { user-select: none; -webkit-user-select: none; touch-action: none; }
        input, [contenteditable="true"], select { touch-action: auto; }
        
        /* Usuwamy strzałki (spinnery) z ewentualnych pól numerycznych */
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        select { -webkit-appearance: none; -moz-appearance: none; appearance: none; }

        .bg-grid {
            background-image: url('data:image/svg+xml,%3Csvg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"%3E%3Cpath d="M0 0h40v40H0V0zm20 20h20v20H20V20zM0 20h20v20H0V20z" fill="%23f1f5f9" fill-opacity="0.6" fill-rule="evenodd"/%3E%3C/svg%3E');
        }

        /* Ustawienia dla druku */
        @media print {
            #main-header, #left-toolbar, #sidebar-overlay, #connect-tooltip, .print-hide, .vsm-drag-btn, .vsm-delete-btn, .resize-handles, #undo-redo-panel {
                display: none !important;
            }
            body { background: white !important; margin: 0; padding: 0; display: block; overflow: visible !important; }
            
            /* Nagłówek widoczny TYLKO do druku */
            #print-header { 
                display: block !important; 
                padding: 15px 20px; 
                border-bottom: 2px solid #10b981;
                margin-bottom: 20px;
                background: white;
            }
            
            #workspace { background: none !important; width: 100vw; height: auto; position: static; overflow: visible !important; }
            .vsm-node { border: 1px solid #94a3b8 !important; box-shadow: none !important; }
            @page { size: landscape; margin: 0.5cm; }
        }
    </style>
</head>
<body class="flex flex-col h-screen bg-slate-50 font-sans text-slate-800 overflow-hidden">

    <!-- NAGŁÓWEK TYLKO DO DRUKU -->
    <div id="print-header" class="hidden">
        <div class="text-xs font-extrabold text-emerald-600 uppercase tracking-widest mb-1" id="print-map-type">MAPA VSM</div>
        <h1 class="text-2xl font-extrabold text-slate-900" id="print-project-name">Projekt Optymalizacji Procesu</h1>
    </div>

    <!-- NAGŁÓWEK APLIKACJI -->
    <header id="main-header" class="bg-white flex-none z-40 relative pt-2 md:pt-3 px-4 md:px-8 border-b border-slate-200">
        <div class="max-w-full mx-auto">
            
            <div class="mb-2 md:mb-3 flex flex-col md:flex-row md:items-center gap-2 md:gap-3">
                <button onclick="toggleSidebar()" class="md:hidden self-start p-1.5 bg-emerald-500 text-white rounded hover:bg-emerald-600 transition-colors shrink-0 print-hide shadow-sm flex items-center justify-center">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
                </button>
                
                <div class="w-full max-w-xl flex items-center">
                    <div class="text-[12px] font-extrabold text-emerald-600 uppercase tracking-[0.1em]" id="lbl-map-type">MAPA VSM</div>
                </div>
            </div>

            <div class="flex flex-wrap md:flex-nowrap items-end justify-between gap-2">
                <nav class="flex space-x-1 md:space-x-2 overflow-x-auto scrollbar-thin w-full md:w-auto print-hide" id="main-tabs">
                    <button onclick="switchTab('vsm')" id="tab-vsm" class="flex items-center gap-2 px-3 py-2 font-bold transition-all duration-200 text-xs md:text-sm bg-white text-emerald-600 border-b-[3px] border-emerald-500 whitespace-nowrap">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                        <span class="uppercase tracking-wide" id="lbl-tab-diagram">Diagram</span>
                    </button>
                    <button onclick="switchTab('tutorial')" id="tab-tutorial" class="flex items-center gap-2 px-3 py-2 font-bold transition-all duration-200 text-xs md:text-sm text-slate-400 hover:text-emerald-600 border-b-[3px] border-transparent whitespace-nowrap">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                        <span class="uppercase tracking-wide" id="lbl-tab-tutorial">Samouczek</span>
                    </button>
                    <button onclick="switchTab('instruction')" id="tab-instruction" class="flex items-center gap-2 px-3 py-2 font-bold transition-all duration-200 text-xs md:text-sm text-slate-400 hover:text-emerald-600 border-b-[3px] border-transparent whitespace-nowrap">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"></path><path d="M18 14h-8"></path><path d="M15 18h-5"></path><path d="M10 6h8v4h-8V6Z"></path></svg>
                        <span class="uppercase tracking-wide" id="lbl-tab-instruction">Instrukcja Obsługi</span>
                    </button>
                </nav>

                <div class="pb-1.5 pl-2 w-full md:w-auto flex justify-end shrink-0 print-hide">
                    <button onclick="window.print()" class="flex items-center justify-center gap-1.5 px-4 py-1.5 bg-white border border-emerald-200 text-emerald-700 hover:bg-emerald-50 hover:border-emerald-300 rounded-lg text-xs font-bold transition-colors shadow-sm w-full md:w-auto">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
                        <span id="lbl-btn-print">Drukuj</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-hidden relative flex">
        
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-20 hidden md:hidden" onclick="toggleSidebar()"></div>

        <!-- ZAKŁADKA 1: OBSZAR ROBOCZY VSM -->
        <div id="view-vsm" class="flex h-full w-full relative">
            
            <div id="left-toolbar" class="w-64 bg-white border-r border-slate-200 flex flex-col shadow-xl z-30 absolute md:relative h-full transform -translate-x-full md:translate-x-0 transition-transform duration-300">
                <div class="p-4 border-b border-slate-100 bg-slate-50 flex justify-between items-center">
                    <div>
                        <h2 class="font-bold text-slate-800 mb-0.5 text-sm" id="lbl-tools-title">Narzędzia VSM</h2>
                        <p class="text-[10px] text-slate-500 uppercase tracking-wider font-semibold" id="lbl-tools-subtitle">Biblioteka Kształtów</p>
                    </div>
                    <button onclick="toggleSidebar()" class="md:hidden text-slate-400 hover:text-slate-600">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
                
                <div class="flex-1 overflow-y-auto p-3 space-y-1.5 scrollbar-thin">
                    <button onclick="addNode('supplier'); if(window.innerWidth<768) toggleSidebar();" class="w-full flex items-center gap-3 px-3 py-2 bg-white hover:bg-emerald-50 text-slate-700 rounded border border-slate-200 hover:border-emerald-300 transition-colors shadow-sm">
                        <div class="text-emerald-600"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 20a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8l-7 5V8l-7 5V4a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"></path><path d="M17 18h1"></path><path d="M12 18h1"></path><path d="M7 18h1"></path></svg></div>
                        <span class="text-[11px] font-bold text-slate-700" id="tool-supplier">Dostawca / Klient</span>
                    </button>
                    <button onclick="addNode('process'); if(window.innerWidth<768) toggleSidebar();" class="w-full flex items-center gap-3 px-3 py-2 bg-white hover:bg-emerald-50 text-slate-700 rounded border border-slate-200 hover:border-emerald-300 transition-colors shadow-sm">
                        <div class="text-emerald-600"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"></rect></svg></div>
                        <span class="text-[11px] font-bold text-slate-700" id="tool-process">Proces</span>
                    </button>
                    <button onclick="addNode('data'); if(window.innerWidth<768) toggleSidebar();" class="w-full flex items-center gap-3 px-3 py-2 bg-white hover:bg-emerald-50 text-slate-700 rounded border border-slate-200 hover:border-emerald-300 transition-colors shadow-sm">
                        <div class="text-emerald-600"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M3 5V19A9 3 0 0 0 21 19V5"></path><path d="M3 12A9 3 0 0 0 21 12"></path></svg></div>
                        <span class="text-[11px] font-bold text-slate-700" id="tool-data">Skrzynka Danych</span>
                    </button>
                    <button onclick="addNode('inventory'); if(window.innerWidth<768) toggleSidebar();" class="w-full flex items-center gap-3 px-3 py-2 bg-white hover:bg-emerald-50 text-slate-700 rounded border border-slate-200 hover:border-emerald-300 transition-colors shadow-sm">
                        <div class="text-emerald-600"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path></svg></div>
                        <span class="text-[11px] font-bold text-slate-700" id="tool-inventory">Zapasy</span>
                    </button>
                    <button onclick="addNode('transport-int'); if(window.innerWidth<768) toggleSidebar();" class="w-full flex items-center gap-3 px-3 py-2 bg-white hover:bg-emerald-50 text-slate-700 rounded border border-slate-200 hover:border-emerald-300 transition-colors shadow-sm">
                        <div class="text-emerald-600">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h2l2 12h10l2-8H7"></path><circle cx="9" cy="20" r="2"></circle><circle cx="16" cy="20" r="2"></circle></svg>
                        </div>
                        <span class="text-[11px] font-bold text-slate-700" id="tool-transport-int">Transport Wew.</span>
                    </button>
                    <button onclick="addNode('transport'); if(window.innerWidth<768) toggleSidebar();" class="w-full flex items-center gap-3 px-3 py-2 bg-white hover:bg-emerald-50 text-slate-700 rounded border border-slate-200 hover:border-emerald-300 transition-colors shadow-sm">
                        <div class="text-emerald-600"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 18H3c-.6 0-1-.4-1-1V7c0-.6.4-1 1-1h10c.6 0 1 .4 1 1v11"></path><path d="M14 9h4l4 4v5c0 .6-.4 1-1 1h-2"></path><circle cx="7" cy="18" r="2"></circle><path d="M15 18H9"></path><circle cx="17" cy="18" r="2"></circle></svg></div>
                        <span class="text-[11px] font-bold text-slate-700" id="tool-transport">Transport Zewn.</span>
                    </button>

                    <div class="my-2 border-t border-slate-100 pt-2"></div>
                    
                    <button onclick="addNode('arrow-thick-push'); if(window.innerWidth<768) toggleSidebar();" class="w-full flex items-center gap-3 px-3 py-2 bg-white hover:bg-slate-50 text-slate-700 rounded border border-slate-200 hover:border-slate-300 transition-colors shadow-sm">
                        <div class="w-5 h-4 relative flex items-center justify-center">
                            <svg width="24" height="12" viewBox="0 0 80 40"><defs><pattern id="stripes-btn" width="12" height="40" patternUnits="userSpaceOnUse" patternTransform="rotate(20)"><rect width="6" height="40" fill="#334155"/><rect x="6" width="6" height="40" fill="#fff"/></pattern></defs><polygon points="0,10 50,10 50,0 80,20 50,40 50,30 0,30" fill="url(#stripes-btn)" stroke="#334155" stroke-width="2"/></svg>
                        </div>
                        <span class="text-[11px] font-bold text-slate-700" id="tool-thick-push">Gruba Strzałka (B-C)</span>
                    </button>
                    <button onclick="addNode('arrow-thick-pull'); if(window.innerWidth<768) toggleSidebar();" class="w-full flex items-center gap-3 px-3 py-2 bg-white hover:bg-slate-50 text-slate-700 rounded border border-slate-200 hover:border-slate-300 transition-colors shadow-sm">
                        <div class="w-5 h-4 relative flex items-center justify-center">
                            <svg width="24" height="12" viewBox="0 0 80 40"><polygon points="0,10 50,10 50,0 80,20 50,40 50,30 0,30" fill="transparent" stroke="#334155" stroke-width="2"/></svg>
                        </div>
                        <span class="text-[11px] font-bold text-slate-700" id="tool-thick-pull">Gruba Strzałka (Przezro.)</span>
                    </button>
                    
                    <button onclick="addNode('kaizen'); if(window.innerWidth<768) toggleSidebar();" class="w-full flex items-center gap-3 px-3 py-2 bg-white hover:bg-yellow-50 text-slate-700 rounded border border-slate-200 hover:border-yellow-300 transition-colors shadow-sm">
                        <div class="text-yellow-500">
                            <svg width="16" height="16" viewBox="0 0 100 70" fill="none" stroke="currentColor" stroke-width="6">
                                <polygon points="50,0 60,20 95,15 75,35 95,55 60,50 50,70 40,50 5,55 25,35 5,15 40,20" />
                            </svg>
                        </div>
                        <span class="text-[11px] font-bold text-slate-700" id="tool-kaizen">Chmura Kaizen</span>
                    </button>

                    <button onclick="addNode('text'); if(window.innerWidth<768) toggleSidebar();" class="w-full flex items-center gap-3 px-3 py-2 bg-white hover:bg-slate-50 text-slate-700 rounded border border-slate-200 hover:border-slate-300 transition-colors shadow-sm">
                        <div class="text-slate-500"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7V4h16v3M9 20h6M12 4v16"/></svg></div>
                        <span class="text-[11px] font-bold text-slate-700" id="tool-text">Pole Tekstowe</span>
                    </button>
                    
                    <div class="my-2 border-t border-slate-100 pt-2"></div>
                    <h3 class="text-[10px] font-semibold text-slate-400 uppercase mb-2 px-1" id="lbl-interact-title">Tryby interakcji</h3>
                    
                    <button id="btn-mode-select" onclick="setMode('select'); if(window.innerWidth<768) toggleSidebar();" class="w-full flex items-center gap-3 px-3 py-2 rounded transition-colors border text-sm bg-emerald-50 border-emerald-400 text-emerald-800 font-bold">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"></path><path d="M13 13l6 6"></path></svg>
                        <span class="text-xs" id="mode-select">Zaznacz / Przesuń</span>
                    </button>
                    <button id="btn-mode-connect-straight" onclick="setMode('connect-straight'); if(window.innerWidth<768) toggleSidebar();" class="w-full flex items-center gap-3 px-3 py-2 rounded transition-colors border text-sm bg-white border-slate-200 text-slate-600 hover:bg-slate-50 mt-1 font-medium">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="M12 5l7 7-7 7"></path></svg>
                        <span class="text-xs" id="mode-straight">Połącz (Prosta)</span>
                    </button>
                    <button id="btn-mode-connect-zigzag" onclick="setMode('connect-zigzag'); if(window.innerWidth<768) toggleSidebar();" class="w-full flex items-center gap-3 px-3 py-2 rounded transition-colors border text-sm bg-white border-slate-200 text-slate-600 hover:bg-slate-50 mt-1 font-medium">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l3-5 4 10 3-5h3"></path><path d="M16 8l4 4-4 4"></path></svg>
                        <span class="text-xs" id="mode-zigzag">Połącz (Zygzak / Info)</span>
                    </button>
                </div>

                <div class="p-4 border-t border-slate-200 bg-slate-50">
                    <button onclick="centerView(); if(window.innerWidth<768) toggleSidebar();" class="w-full flex items-center justify-center gap-2 bg-emerald-500 hover:bg-emerald-600 text-white py-2.5 px-4 rounded-md shadow-sm transition-colors text-sm font-bold tracking-wide">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
                        <span id="btn-center-view">Środkuj widok</span>
                    </button>
                </div>
            </div>

            <!-- OBSZAR PŁÓTNA -->
            <div id="workspace" class="flex-1 overflow-hidden relative bg-grid bg-white cursor-grab no-select">
                
                <!-- COFNIJ / PONÓW -->
                <div id="undo-redo-panel" class="absolute top-4 left-4 z-20 flex bg-white border border-slate-200 rounded-md shadow-sm print-hide">
                    <button id="btn-undo" onclick="undo()" class="p-2 text-slate-600 hover:bg-slate-100 transition-colors rounded-l-md border-r border-slate-200 disabled:opacity-50 disabled:cursor-not-allowed" title="Cofnij">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"></path><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path></svg>
                    </button>
                    <button id="btn-redo" onclick="redo()" class="p-2 text-slate-600 hover:bg-slate-100 transition-colors rounded-r-md disabled:opacity-50 disabled:cursor-not-allowed" title="Ponów">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"></path><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"></path></svg>
                    </button>
                </div>

                <div id="connect-tooltip" class="hidden absolute top-4 left-1/2 -translate-x-1/2 bg-emerald-700 text-white px-5 py-2.5 rounded-full shadow-lg z-50 text-xs flex items-center gap-2 animate-pulse border border-emerald-600 pointer-events-none font-medium tracking-wide">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                    <span id="connect-tooltip-text">Kliknij element początkowy</span>
                    <button onclick="setMode('select')" class="ml-3 underline text-emerald-200 hover:text-white pointer-events-auto print-hide" id="btn-cancel">Anuluj</button>
                </div>

                <div id="transform-container" class="absolute origin-top-left w-full h-full" style="transform: translate(0px, 0px) scale(1)">
                    <svg id="edges-layer" class="absolute top-0 left-0 overflow-visible pointer-events-none" style="z-index: 0">
                        <defs>
                            <marker id="arrowhead-straight" markerWidth="16" markerHeight="12" refX="14" refY="6" orient="auto">
                                <polygon points="0 0, 16 6, 0 12" fill="#475569" />
                            </marker>
                            <marker id="arrowhead-zigzag" markerWidth="16" markerHeight="12" refX="14" refY="6" orient="auto">
                                <polygon points="0 0, 16 6, 0 12" fill="#10b981" />
                            </marker>
                        </defs>
                        <g id="guides-layer"></g>
                        <g id="timeline-drag-layer"></g> 
                        <g id="timeline-layer"></g>
                        <g id="edges-group"></g>
                    </svg>

                    <div id="timeline-labels" class="absolute top-0 left-0 pointer-events-none" style="z-index: 5"></div>
                    <div id="nodes-layer" class="absolute top-0 left-0" style="z-index: 10"></div>
                </div>
            </div>
        </div>

        <!-- ZAKŁADKA 2: SAMOUCZEK -->
        <div id="view-tutorial" class="hidden h-full w-full overflow-y-auto bg-slate-50 p-4 md:p-8">
            <div id="content-tutorial" class="max-w-5xl mx-auto text-slate-700"></div>
        </div>

        <!-- ZAKŁADKA 3: INSTRUKCJA -->
        <div id="view-instruction" class="hidden h-full w-full overflow-y-auto bg-slate-50 p-4 md:p-8">
             <div id="content-instruction" class="max-w-4xl mx-auto space-y-6 md:space-y-8 text-slate-700"></div>
        </div>

    </main>

    <script>
        // --- TRANSLACJE (i18n) ---
        const i18n = {
            pl: {
                mapType: "MAPA VSM",
                tabDiagram: "Diagram",
                tabTutorial: "Samouczek",
                tabInstruction: "Instrukcja Obsługi",
                btnPrint: "Drukuj",
                toolsTitle: "Narzędzia VSM",
                toolsSubtitle: "Biblioteka Kształtów",
                toolSupplier: "Dostawca / Klient",
                toolProcess: "Proces",
                toolData: "Skrzynka Danych",
                toolInventory: "Zapasy",
                toolTransportInt: "Transport Wew.",

                toolThickPush: "Gruba Strzałka (B-C)",

                titleUndo: "Cofnij",
                titleRedo: "Ponów",
                tutorialHTML: `
                    <div class="mb-8">
                        <h1 class="text-2xl md:text-3xl font-extrabold text-slate-800 border-b-2 border-emerald-500 pb-3 inline-block">Samouczek VSM & PCE</h1>
                    </div>
                    
                    <section class="bg-white p-5 md:p-6 rounded-xl border-t-4 border-t-emerald-500 shadow-sm mb-6">
                        <h2 class="text-lg md:text-xl font-bold text-slate-800 mb-3">Wprowadzenie do VSM</h2>
                        <p class="mb-3 leading-relaxed text-sm md:text-base text-slate-600">Value Stream Mapping (VSM) to jedno z najpotężniejszych narzędzi Lean Management. Pozwala nie tylko "zobaczyć" przepływ materiałów i informacji, ale przede wszystkim zidentyfikować, gdzie marnujemy czas i pieniądze.</p>
                        <div class="bg-emerald-50 border-l-4 border-emerald-500 p-4 rounded-r-lg mt-4">
                            <h4 class="font-bold text-emerald-800 mb-1 text-sm">Złote zasady:</h4>
                            <ul class="list-disc list-inside text-sm text-emerald-700 space-y-1">
                                <li>Nie mapuj wszystkiego. Wybierz jedną grupę produktów o największym wolumenie lub generującą najwięcej problemów.</li>
                                <li>Udaj się na <b>Gemba</b>. Nie ufaj dokumentacji – zaufaj temu, co widzisz na własne oczy.</li>
                            </ul>
                        </div>
                    </section>

                    <section class="mb-6">
                        <h2 class="text-xl font-bold text-slate-800 mb-4">Główne komponenty Mapy</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="bg-white border border-slate-200 border-l-4 border-l-emerald-500 p-4 rounded-lg shadow-sm flex flex-col gap-2">
                                <div class="flex items-center gap-3"><div class="bg-emerald-100 p-2 rounded text-emerald-600"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="3" rx="2"></rect></svg></div><h3 class="font-bold text-slate-800">Proces i Data Box</h3></div>
                                <p class="text-sm text-slate-600">Każdy główny etap (np. Montaż). W ramce danych (Data Box) wpisujemy:<br><b>C/T (Cycle Time)</b>: Co ile schodzi sztuka?<br><b>C/O (Changeover)</b>: Czas przezbrojenia.<br><b>Uptime</b>: Dostępność maszyny.</p>
                            </div>
                            <div class="bg-white border border-slate-200 border-l-4 border-l-yellow-500 p-4 rounded-lg shadow-sm flex flex-col gap-2">
                                <div class="flex items-center gap-3"><div class="bg-yellow-100 p-2 rounded text-yellow-600"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path></svg></div><h3 class="font-bold text-slate-800">Zapasy i Transport</h3></div>
                                <p class="text-sm text-slate-600">Trójkąty zapasów pokazują ile sztuk zalega. <b>Transport</b> to cichy zabójca wydajności (jedno z 7 Muda). Klient nie płaci za przewożenie towaru wózkiem. Transport ląduje zawsze na górnej osi czasu jako strata.</p>
                            </div>
                        </div>
                    </section>

                    <section class="bg-white p-5 md:p-6 rounded-xl border-t-4 border-t-blue-500 shadow-sm mb-6">
                        <h2 class="text-lg md:text-xl font-bold text-slate-800 mb-3">Oś czasu i wskaźnik PCE</h2>
                        <p class="text-sm md:text-base text-slate-600 mb-4">Na dole mapy rysujemy "schodki", które są sercem VSM. Górne poziomy to czasy oczekiwania (<b>NVA - Non-Value Added</b>). Dolne poziomy to realny czas pracy (<b>VA - Value Added</b>).</p>
                        
                        <h3 class="font-bold text-slate-800 mb-2">Process Cycle Efficiency (PCE)</h3>
                        <p class="text-sm text-slate-600 mb-3">Wskaźnik ten mówi, jaki procent czasu przejścia dodaje wartość produktowi w oczach klienta.</p>
                        
                        <div class="bg-slate-800 text-blue-300 font-mono p-4 rounded-lg text-center mb-4 text-sm overflow-x-auto">
                            PCE = (Suma VAT / Total Lead Time PLT) × 100%
                        </div>
                        
                        <div class="bg-blue-50 p-4 rounded-lg text-sm text-slate-700">
                            <h4 class="font-bold mb-2">Przykład obliczeniowy:</h4>
                            <ul class="list-none space-y-1 mb-2">
                                <li>Łączny czas pracy (VAT) = <b>30 minut</b></li>
                                <li>Czas leżenia w zapasach = <b>5 dni (7200 minut)</b></li>
                                <li>Całkowity Lead Time (PLT) = <b>7230 minut</b></li>
                            </ul>
                            <p class="font-bold text-blue-800 text-base mt-2">PCE = (30 / 7230) × 100% ≈ 0,41%</p>
                        </div>
                    </section>

                    <section class="bg-white p-5 md:p-6 rounded-xl border-t-4 border-t-red-500 shadow-sm">
                        <h2 class="text-lg md:text-xl font-bold text-slate-800 mb-3">Brutalna prawda o procesach</h2>
                        <p class="text-sm text-slate-600 mb-4">W tradycyjnych firmach PCE często wynosi poniżej 5%. Oznacza to, że przez 95% czasu produkt po prostu na coś czeka. Gdzie możemy wprowadzić One-Piece Flow? Gdzie zastosować system Pull?</p>
                        
                        <div class="overflow-x-auto rounded-lg border border-slate-200">
                            <table class="min-w-full text-xs md:text-sm text-left text-slate-600">
                                <thead class="bg-slate-50 text-slate-700 font-bold border-b border-slate-200">
                                    <tr><th class="px-4 py-3">Klasa procesu</th><th class="px-4 py-3">Typowe PCE</th><th class="px-4 py-3 hidden md:table-cell">Charakterystyka</th></tr>
                                </thead>
                                <tbody class="divide-y divide-slate-100">
                                    <tr><td class="px-4 py-3">Tradycyjna produkcja</td><td class="px-4 py-3 font-bold text-red-500">1% – 5%</td><td class="px-4 py-3 hidden md:table-cell">Produkt spędza czas w kolejkach i na transporcie.</td></tr>
                                    <tr class="bg-slate-50"><td class="px-4 py-3">Procesy biurowe</td><td class="px-4 py-3 font-bold text-red-500">&lt; 1%</td><td class="px-4 py-3 hidden md:table-cell">Dokumenty leżą tygodniami, podczas gdy praca trwa 15 min.</td></tr>
                                    <tr><td class="px-4 py-3">Procesy "Lean" (cel)</td><td class="px-4 py-3 font-bold text-yellow-600">10% – 15%</td><td class="px-4 py-3 hidden md:table-cell">Dobry poziom dla firm w trakcie transformacji.</td></tr>
                                    <tr class="bg-slate-50"><td class="px-4 py-3">World Class Mfg</td><td class="px-4 py-3 font-bold text-emerald-600">20% – 30%</td><td class="px-4 py-3 hidden md:table-cell">One-Piece Flow, minimalne zapasy, optymalizacja.</td></tr>
                                </tbody>
                            </table>
                        </div>
                        <p class="text-xs text-slate-500 mt-4">Dlaczego 100% jest niemożliwe? Istnieją czasy technologiczne (schnięcie, chłodzenie), które wydłużają Lead Time, ale technicznie nie dodają wartości manualnej.</p>
                    </section>
                `,
                instructionHTML: `
                    <h1 class="text-2xl md:text-3xl font-extrabold text-slate-800 border-b-2 border-emerald-500 pb-3 inline-block">Jak korzystać z aplikacji?</h1>
                    <div class="space-y-4 md:space-y-6">
                        <div class="bg-white border border-slate-200 rounded-lg p-4 md:p-5 shadow-sm flex gap-4 md:gap-5 items-start">
                            <div class="flex-none bg-emerald-500 text-white w-8 md:w-10 h-8 md:h-10 rounded-full flex items-center justify-center font-bold shadow-sm text-base md:text-lg">1</div>
                            <div class="pt-1"><h3 class="text-base md:text-lg font-bold text-slate-800">Przesuwanie i Zaznaczanie</h3><div class="text-sm md:text-base text-slate-500 mt-2 leading-relaxed">Pojedyncze kliknięcie zaznacza obiekt. W lewym górnym rogu pojawi się uchwyt do łapania i przesuwania (krzyżyk), a w prawym górnym rogu ikona usuwania (kosz). W prawym dolnym rogu jest uchwyt do skalowania wielkości.</div></div>

                            <div class="pt-1"><h3 class="text-base md:text-lg font-bold text-slate-800">Edycja Tekstu i Czasów</h3><div class="text-sm md:text-base text-slate-500 mt-2 leading-relaxed">Aby pisać na polach tekstowych, <b>kliknij w nie szybko dwa razy</b> (double tap). Wartości i jednostki czasu (np. 10 min, 5 s, 2 h, 1 dni) wpisuj ręcznie prosto w pola tekstowe. Pola same dobiorą odpowiedni przelicznik czasu.</div></div>
                        </div>
                        <div class="bg-white border border-slate-200 rounded-lg p-4 md:p-5 shadow-sm flex gap-4 md:gap-5 items-start">
                            <div class="flex-none bg-emerald-500 text-white w-8 md:w-10 h-8 md:h-10 rounded-full flex items-center justify-center font-bold shadow-sm text-base md:text-lg">3</div>
                            <div class="pt-1"><h3 class="text-base md:text-lg font-bold text-slate-800">Delikatne Linie Referencyjne</h3><div class="text-sm md:text-base text-slate-500 mt-2 leading-relaxed">Podczas ciągnięcia elementu, program szuka w pobliżu innych obiektów. Jeśli znajdą się w osi, zobaczysz jasnoszarą, subtelną linię podpowiedzi. Element idealnie wyrówna się bez oporu myszki.</div></div>

                            <div class="flex-none bg-emerald-500 text-white w-8 md:w-10 h-8 md:h-10 rounded-full flex items-center justify-center font-bold shadow-sm text-base md:text-lg">4</div>
                            <div class="pt-1"><h3 class="text-base md:text-lg font-bold text-slate-800">Cofanie, Transport i PCE</h3><div class="text-sm md:text-base text-slate-500 mt-2 leading-relaxed">Linia Czasu posiada uchwyt do swobodnego przesuwania w pionie. Ikona "Transport Wew." jest dodawana do osi jako NVA. Podsumowanie na końcu oblicza % PCE (VA/Total Time). Każdą akcję możesz wycofać używając strzałek w lewym górnym rogu.</div></div>

                titleUndo: "Undo",
                titleRedo: "Redo",
                tutorialHTML: `
                    <div class="mb-8">
                        <h1 class="text-2xl md:text-3xl font-extrabold text-slate-800 border-b-2 border-emerald-500 pb-3 inline-block">VSM & PCE Tutorial</h1>
                    </div>
                    
                    <section class="bg-white p-5 md:p-6 rounded-xl border-t-4 border-t-emerald-500 shadow-sm mb-6">
                        <h2 class="text-lg md:text-xl font-bold text-slate-800 mb-3">Introduction to VSM</h2>
                        <p class="mb-3 leading-relaxed text-sm md:text-base text-slate-600">Value Stream Mapping (VSM) is one of the most powerful Lean Management tools. It not only allows you to "see" the flow of materials and information, but above all, to identify where time and money are wasted.</p>
                        <div class="bg-emerald-50 border-l-4 border-emerald-500 p-4 rounded-r-lg mt-4">
                            <h4 class="font-bold text-emerald-800 mb-1 text-sm">Golden rules:</h4>
                            <ul class="list-disc list-inside text-sm text-emerald-700 space-y-1">
                                <li>Don't map everything. Choose one product family with the highest volume or generating the most problems.</li>
                                <li>Go to the <b>Gemba</b>. Do not trust documentation - trust what you see with your own eyes.</li>
                            </ul>
                        </div>
                    </section>

                    <section class="mb-6">
                        <h2 class="text-xl font-bold text-slate-800 mb-4">Main Map Components</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="bg-white border border-slate-200 border-l-4 border-l-emerald-500 p-4 rounded-lg shadow-sm flex flex-col gap-2">
                                <div class="flex items-center gap-3"><div class="bg-emerald-100 p-2 rounded text-emerald-600"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="3" rx="2"></rect></svg></div><h3 class="font-bold text-slate-800">Process and Data Box</h3></div>
                                <p class="text-sm text-slate-600">Each main stage (e.g. Assembly). In the Data Box we write:<br><b>C/T (Cycle Time)</b>: How often does a part come off?<br><b>C/O (Changeover)</b>: Setup time.<br><b>Uptime</b>: Machine availability.</p>
                            </div>
                            <div class="bg-white border border-slate-200 border-l-4 border-l-yellow-500 p-4 rounded-lg shadow-sm flex flex-col gap-2">
                                <div class="flex items-center gap-3"><div class="bg-yellow-100 p-2 rounded text-yellow-600"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path></svg></div><h3 class="font-bold text-slate-800">Inventory and Transport</h3></div>
                                <p class="text-sm text-slate-600">Inventory triangles show how many pieces are piled up. <b>Transport</b> is a silent productivity killer (one of the 7 Mudas). Transport always lands on the upper timeline as waste.</p>
                            </div>
                        </div>
                    </section>

                    <section class="bg-white p-5 md:p-6 rounded-xl border-t-4 border-t-blue-500 shadow-sm mb-6">
                        <h2 class="text-lg md:text-xl font-bold text-slate-800 mb-3">Timeline and PCE indicator</h2>
                        <p class="text-sm md:text-base text-slate-600 mb-4">At the bottom of the map we draw "stairs", which are the heart of VSM. Upper levels are waiting times (<b>NVA - Non-Value Added</b>). Lower levels are real processing times (<b>VA - Value Added</b>).</p>
                        
                        <h3 class="font-bold text-slate-800 mb-2">Process Cycle Efficiency (PCE)</h3>
                        <p class="text-sm text-slate-600 mb-3">This indicator tells us what percentage of the total lead time actually adds value to the product in the eyes of the customer.</p>
                        
                        <div class="bg-slate-800 text-blue-300 font-mono p-4 rounded-lg text-center mb-4 text-sm overflow-x-auto">
                            PCE = (Sum of VAT / Total Lead Time PLT) × 100%
                        </div>
                        
                        <div class="bg-blue-50 p-4 rounded-lg text-sm text-slate-700">
                            <h4 class="font-bold mb-2">Calculation example:</h4>
                            <ul class="list-none space-y-1 mb-2">
                                <li>Total working time (VAT) = <b>30 minutes</b></li>
                                <li>Time spent in inventory = <b>5 days (7200 minutes)</b></li>
                                <li>Total Lead Time (PLT) = <b>7230 minutes</b></li>
                            </ul>
                            <p class="font-bold text-blue-800 text-base mt-2">PCE = (30 / 7230) × 100% ≈ 0.41%</p>
                        </div>
                    </section>

                    <section class="bg-white p-5 md:p-6 rounded-xl border-t-4 border-t-red-500 shadow-sm">
                        <h2 class="text-lg md:text-xl font-bold text-slate-800 mb-3">The brutal truth about processes</h2>
                        <p class="text-sm text-slate-600 mb-4">In traditional companies, PCE is often below 5%. This means that 95% of the time, the product is just waiting. Where can we implement One-Piece Flow? Where to use a Pull system?</p>
                        
                        <div class="overflow-x-auto rounded-lg border border-slate-200">
                            <table class="min-w-full text-xs md:text-sm text-left text-slate-600">
                                <thead class="bg-slate-50 text-slate-700 font-bold border-b border-slate-200">
                                    <tr><th class="px-4 py-3">Process class</th><th class="px-4 py-3">Typical PCE</th><th class="px-4 py-3 hidden md:table-cell">Characteristics</th></tr>
                                </thead>
                                <tbody class="divide-y divide-slate-100">
                                    <tr><td class="px-4 py-3">Traditional mfg</td><td class="px-4 py-3 font-bold text-red-500">1% – 5%</td><td class="px-4 py-3 hidden md:table-cell">Product spends time in queues and transport.</td></tr>
                                    <tr class="bg-slate-50"><td class="px-4 py-3">Office processes</td><td class="px-4 py-3 font-bold text-red-500">&lt; 1%</td><td class="px-4 py-3 hidden md:table-cell">Documents lie for weeks, actual work is 15 min.</td></tr>
                                    <tr><td class="px-4 py-3">"Lean" processes (goal)</td><td class="px-4 py-3 font-bold text-yellow-600">10% – 15%</td><td class="px-4 py-3 hidden md:table-cell">Good level for companies during transformation.</td></tr>
                                    <tr class="bg-slate-50"><td class="px-4 py-3">World Class Mfg</td><td class="px-4 py-3 font-bold text-emerald-600">20% – 30%</td><td class="px-4 py-3 hidden md:table-cell">One-Piece Flow, minimal inventory, optimization.</td></tr>
                                </tbody>
                            </table>
                        </div>
                        <p class="text-xs text-slate-500 mt-4">Why is 100% impossible? There are technological times (drying, cooling) that extend Lead Time but technically don't add manual value.</p>
                    </section>
                `,
                instructionHTML: `
                    <h1 class="text-2xl md:text-3xl font-extrabold text-slate-800 border-b-2 border-emerald-500 pb-3 inline-block">How to use the app?</h1>

                            <div class="pt-1"><h3 class="text-base md:text-lg font-bold text-slate-800">Undo, Timeline & PCE</h3><div class="text-sm md:text-base text-slate-500 mt-2 leading-relaxed">Grab any part of the timeline to move it up or down. "Internal Transport" adds NVA time to the timeline. The summary calculates accurate <b>PCE</b> %. You can undo/redo any action.</div></div>
                        </div>
                    </div>
                `
            }
        };

        function setLanguage(lang) {

            document.getElementById('print-map-type').innerText = t.mapType;

        function parseTime(str) {
            if (!str) return 0;
            const s = String(str).toLowerCase().trim();
            const match = s.match(/([0-9.,]+)\s*([a-zżółćęśąńź]+)?/);
            if (!match) return 0;
            const val = parseFloat(match[1].replace(',', '.'));
            if (isNaN(val)) return 0;
            const unit = match[2] || '';
            if (unit.startsWith('s')) return val;
            if (unit.startsWith('m')) return val * 60;
            if (unit.startsWith('g') || unit.startsWith('h')) return val * 3600;
            if (unit.startsWith('d')) return val * 3600 * 8;
            if (unit.startsWith('t')) return val * 3600 * 8 * 5;
            return val;
        }

        function formatTimeDetailed(secs, lang) {
            if (!secs || secs === 0) return '0 s';
            let d = 0, h = 0, m = 0, s = 0;
            let isPl = lang === 'pl';
            d = Math.floor(secs / (3600 * 8));
            let rem = secs % (3600 * 8);
            h = Math.floor(rem / 3600);
            rem = rem % 3600;
            m = Math.floor(rem / 60);
            s = rem % 60;
            
            let parts = [];
            if (d > 0) parts.push(`${d} ${isPl ? 'dni' : 'days'}`);
            if (h > 0) parts.push(`${h} h`);
            if (m > 0) parts.push(`${m} min`);
            if (s > 0 || parts.length === 0) parts.push(`${Math.round(s)} s`);
            
            return parts.join(', ');
        }

        function getNodeRect(n) {
            let w = 130, h = 90;
            if (n.type === 'process') { w = 150; h = 180; }
            if (n.type === 'inventory' || n.type === 'transport-int') { w = 80; h = 100; }
            if (n.type === 'kaizen') { w = n.width || 180; h = n.height || 120; }
            if (n.type === 'text') { w = 100; h = 40; } 
            if (n.type && n.type.startsWith('arrow-thick')) { w = n.width || 120; h = n.height || 50; }
            if (n.type === 'data') { w = 140; h = 140; }
            if (n.type === 'supplier') { w = 130; h = 120; }
            if (n.type === 'transport') { w = 90; h = 120; }
            return { w, h, cx: (parseFloat(n.x) || 0) + w/2, cy: (parseFloat(n.y) || 0) + h/2 };
        }

        const workspaceEl = document.getElementById('workspace');

        function updateTransform() {
            if (!isFinite(zoom) || zoom <= 0) zoom = 1;
            if (!isFinite(pan.x)) pan.x = 0;
            if (!isFinite(pan.y)) pan.y = 0;
            transformContainer.style.transform = `translate(${pan.x}px, ${pan.y}px) scale(${zoom})`;
        }

        workspaceEl.addEventListener('pointerdown', (e) => {
            if (e.target.closest('.vsm-node') || e.target.closest('.timeline-drag-area') || e.target.closest('.print-hide')) return;
            
            selectedNodeId = null;
            updateNodesRender();
            if (interactionMode.startsWith('connect')) {
                connectionStart = null;
                updateNodesRender();
                return;
            }

            activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
            try { workspaceEl.setPointerCapture(e.pointerId); } catch(err){}

            if (activePointers.size === 1) {
                isPanning = true;
                lastPanPos = { x: e.clientX, y: e.clientY };
                workspaceEl.classList.remove('cursor-grab');
                workspaceEl.classList.add('cursor-grabbing');
            } else if (activePointers.size === 2) {
                isPanning = false;
                const pts = Array.from(activePointers.values());
                initialPinchDistance = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
                initialPinchZoom = zoom;
                initialPinchCenter = { x: (pts[0].x + pts[1].x)/2, y: (pts[0].y + pts[1].y)/2 };
            }
        });

        workspaceEl.addEventListener('pointermove', (e) => {
            if (activePointers.has(e.pointerId)) {
                activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

                if (activePointers.size === 2) {
                    const pts = Array.from(activePointers.values());
                    const currentDistance = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
                    const currentCenter = { x: (pts[0].x + pts[1].x)/2, y: (pts[0].y + pts[1].y)/2 };
                    
                    const scaleAdjust = currentDistance / initialPinchDistance;
                    let newZoom = Math.max(0.1, Math.min(initialPinchZoom * scaleAdjust, 3));
                    
                    const rect = workspaceEl.getBoundingClientRect();
                    const mouseX = initialPinchCenter.x - rect.left;
                    const mouseY = initialPinchCenter.y - rect.top;

                    pan.x = mouseX - (mouseX - pan.x) * (newZoom / zoom) + (currentCenter.x - initialPinchCenter.x);
                    pan.y = mouseY - (mouseY - pan.y) * (newZoom / zoom) + (currentCenter.y - initialPinchCenter.y);
                    
                    zoom = newZoom;
                    initialPinchCenter = currentCenter;
                    initialPinchZoom = zoom;
                    initialPinchDistance = currentDistance;
                    
                    updateTransform();
                } else if (activePointers.size === 1 && isPanning) {
                    const dx = e.clientX - lastPanPos.x;
                    const dy = e.clientY - lastPanPos.y;
                    pan.x += dx;
                    pan.y += dy;
                    lastPanPos = { x: e.clientX, y: e.clientY };
                    updateTransform();
                }
            }
        });

        function endWorkspacePointer(e) {
            activePointers.delete(e.pointerId);
            if (activePointers.size < 2) {
                initialPinchDistance = null;
            }
            if (activePointers.size === 0) {
                isPanning = false;
                workspaceEl.classList.add('cursor-grab');
                workspaceEl.classList.remove('cursor-grabbing');
            } else if (activePointers.size === 1) {
                const remaining = Array.from(activePointers.values())[0];
                lastPanPos = { x: remaining.x, y: remaining.y };
                isPanning = true;
            }
        }
        workspaceEl.addEventListener('pointerup', endWorkspacePointer);

        workspaceEl.addEventListener('wheel', (e) => {
            e.preventDefault();
            const scaleAdjust = e.deltaY > 0 ? 0.9 : 1.1;
            let newZoom = Math.max(0.1, Math.min(zoom * scaleAdjust, 3));
            const rect = workspaceEl.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            pan.x = mouseX - (mouseX - pan.x) * (newZoom / zoom);
            pan.y = mouseY - (mouseY - pan.y) * (newZoom / zoom);
            zoom = newZoom;
            updateTransform();
        }, { passive: false });

        document.addEventListener('pointermove', (e) => {
            if (!lastPointerPos) return;
            const dx = e.clientX - lastPointerPos.x;
            const dy = e.clientY - lastPointerPos.y;
            
            if (isResizingNode || isRotatingNode || draggingNode || isDraggingTimeline) {
                e.preventDefault(); 
                hasMoved = true;
            }

            if (isDraggingTimeline) {
                let baseMaxY = 300;
                const mainNodes = nodes.filter(n => ['process', 'supplier', 'data'].includes(n.type));
                if (mainNodes.length > 0) baseMaxY = Math.max(...mainNodes.map(n => (parseFloat(n.y)||0) + (n.height || (n.type === 'process' ? 180 : 120))));
                
                let currentBottom = customTimelineY !== null ? customTimelineY : baseMaxY + 80;
                currentBottom += dy / zoom;
                customTimelineY = currentBottom;
                
                renderDynamicTimeline();
                lastPointerPos = { x: e.clientX, y: e.clientY };
            } else if (isResizingNode) {
                const node = nodes.find(n => n.id === isResizingNode);
                if(node) {
                    node.width = Math.max(40, (node.width || 120) + dx / zoom);
                    node.height = Math.max(40, (node.height || 60) + dy / zoom);
                    const nodeEl = document.querySelector(`.vsm-node[data-id="${node.id}"]`);
                    if(nodeEl) {
                        nodeEl.style.width = `${node.width}px`;
                        nodeEl.style.height = `${node.height}px`;
                    }
                    renderEdges();
                }
                lastPointerPos = { x: e.clientX, y: e.clientY };
            } else if (isRotatingNode) {
                const node = nodes.find(n => n.id === isRotatingNode);
                if(node) {
                    const nodeEl = document.querySelector(`.vsm-node[data-id="${node.id}"]`);
                    if(nodeEl) {
                        const rect = nodeEl.getBoundingClientRect();
                        const centerX = rect.left + rect.width / 2;
                        const centerY = rect.top + rect.height / 2;
                        const angle = Math.atan2(e.clientY - centerY, e.clientX - centerX) * (180 / Math.PI);
                        node.rotation = angle + 90;
                        nodeEl.style.transform = `rotate(${node.rotation}deg)`;
                    }
                }
                lastPointerPos = { x: e.clientX, y: e.clientY };
            } else if (draggingNode) {
                const node = nodes.find(n => n.id === draggingNode);
                if (node) {
                    dragVirtualX += dx / zoom;
                    dragVirtualY += dy / zoom;
                    
                    let newX = dragVirtualX;
                    let newY = dragVirtualY;
                    
                    const nRect = { w: getNodeRect(node).w, h: getNodeRect(node).h, cx: newX + getNodeRect(node).w/2, cy: newY + getNodeRect(node).h/2 };
                    let snapX = null;
                    let snapY = null;
                    const snapThreshold = 5 / zoom; 
                    
                    nodes.forEach(other => {
                        if(other.id === node.id) return;
                        const oRect = getNodeRect(other);
                        if (Math.abs(nRect.cx - oRect.cx) < snapThreshold) snapX = oRect.cx;
                        if (Math.abs(nRect.cy - oRect.cy) < snapThreshold) snapY = oRect.cy;
                        if (Math.abs(newY - (parseFloat(other.y)||0)) < snapThreshold) snapY = (parseFloat(other.y)||0) + nRect.h/2;
                    });

                    if (snapX !== null) { newX = snapX - nRect.w/2; guides.x = snapX; } else { guides.x = null; }
                    if (snapY !== null) { newY = snapY - nRect.h/2; guides.y = snapY; } else { guides.y = null; }

                    node.x = newX;
                    node.y = newY;
                    const nodeEl = document.querySelector(`.vsm-node[data-id="${node.id}"]`);
                    if(nodeEl) {
                        nodeEl.style.left = `${node.x}px`;
                        nodeEl.style.top = `${node.y}px`;
                    }
                    renderEdges();
                    renderDynamicTimeline();
                    renderGuides();
                }
                lastPointerPos = { x: e.clientX, y: e.clientY };
            }
        }, { passive: false });

        function renderGuides() {
